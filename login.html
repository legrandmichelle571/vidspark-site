<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VidSpark AI — Connexion</title>

  <!-- ⚡ Pré-connexion aux services externes (accélère le login) -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fnhyskbisfbtjgblbiap.supabase.co" crossorigin>
  <link rel="dns-prefetch" href="https://vidspark-ai-production-9ac7.up.railway.app">
  <!-- Charge la librairie Supabase en parallèle, sans bloquer l'affichage -->
  <link rel="preload" as="script" href="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #07070a;
      color: #e8e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 20px; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
    p { color: #8888a0; margin-bottom: 40px; font-size: 14px; }
    .btn {
      width: 100%;
      padding: 14px;
      background: #f7941d;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.2s;
    }
    .btn:hover { background: #f9a94a; }
  </style>
<style id="orange-frames">
/* Encadrement orange sur tous les panneaux/cartes */
.card,.kpi,.section,.panel,.box,.contact-card,.pricing-card,.price-card,.plan-card,.tier-card,.tier,.feature,.feature-card,.faq-item,.faq,.tool-card,.stat-card,.stat,.glass,.info-card,.info-item,.step,.opp-card{border:1.5px solid #f7941d !important;}
/* Les tuiles d'outils restent pleines (sans bordure) */
.tool-tile{border:none !important;}
</style>
</head>
<body>
  <div class="container">
    <div class="logo">✨</div>
    <h1>VidSpark AI</h1>
    <p>Analysez vos vidéos YouTube avec l'IA</p>
    <button class="btn" onclick="login()">
      🔐 Se connecter avec Google
    </button>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script>
    async function login() {
      console.log('[Login] Button clicked');
      await GoogleAuth.login();
    }

    // Si déjà connecté, aller au dashboard
    window.addEventListener('load', async () => {
      const user = await Auth.getCurrentUser();
      if (user) {
        console.log('[Login] Already logged in, redirecting...');
        window.location.href = '/dashboard.html';
      }
    });
  </script>
</body>
</html>
