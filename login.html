<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VidSpark AI — Connexion</title>

  <!-- ⚡ Pré-connexion aux services externes (accélère le login) -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fnhyskbisfbtjgblbiap.supabase.co" crossorigin>
  <link rel="dns-prefetch" href="https://vidspark-ai-production-9ac7.up.railway.app">
  <!-- Charge la librairie Supabase en parallèle, sans bloquer l'affichage -->
  <link rel="preload" as="script" href="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  <link rel="stylesheet" href="/css/tokens.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--vs-bg);
      color: var(--vs-text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 20px; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
    p { color: var(--vs-muted); margin-bottom: 40px; font-size: 14px; }
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--vs-accent);
      color: #0b0f19;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.2s, transform .15s;
      box-shadow: 0 8px 22px -8px var(--vs-accent-glow);
    }
    .btn:hover { background: var(--vs-accent-2); }
    .btn:focus-visible { outline: 2px solid var(--vs-accent); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce){ .btn{ transition:none; } }
  </style>
  <script src="/js/i18n.js"></script>
  <script src="/js/meta-pixel.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FBF8F3">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VidSpark AI">
  <link rel="stylesheet" href="/css/responsive.css">
  <script defer src="/js/pwa.js"></script>
</head>
<body>
  <div class="container">
    <div class="logo">✨</div>
    <h1>VidSpark AI</h1>
    <p data-i18n="lg_sub">Analysez vos vidéos YouTube avec l'IA</p>
    <button class="btn" onclick="login()" data-i18n="lg_btn">
      🔐 Se connecter avec Google
    </button>
  </div>
  <script>
    registerI18n({
      lg_sub:{fr:"Analysez vos vidéos YouTube avec l'IA",en:'Analyze your YouTube videos with AI',es:'Analiza tus vídeos de YouTube con IA',ar:'حلّل فيديوهات يوتيوب بالذكاء الاصطناعي',pt:'Analise seus vídeos do YouTube com IA',de:'Analysiere deine YouTube-Videos mit KI',it:'Analizza i tuoi video YouTube con l’IA',ru:'Анализируйте видео YouTube с помощью ИИ',ja:'AIでYouTube動画を分析',ko:'AI로 YouTube 영상 분석',hi:'AI से अपने YouTube वीडियो का विश्लेषण करें',zh:'用 AI 分析你的 YouTube 视频',tr:'YouTube videolarını yapay zekâ ile analiz et',nl:'Analyseer je YouTube-video’s met AI'},
      lg_btn:{fr:'🔐 Se connecter avec Google',en:'🔐 Sign in with Google',es:'🔐 Iniciar sesión con Google',ar:'🔐 تسجيل الدخول عبر Google',pt:'🔐 Entrar com Google',de:'🔐 Mit Google anmelden',it:'🔐 Accedi con Google',ru:'🔐 Войти через Google',ja:'🔐 Googleでログイン',ko:'🔐 Google로 로그인',hi:'🔐 Google से साइन इन करें',zh:'🔐 使用 Google 登录',tr:'🔐 Google ile giriş yap',nl:'🔐 Inloggen met Google'}
    });
  </script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script>
    async function login() {
      console.log('[Login] Button clicked');
      await GoogleAuth.login();
    }

    // Si déjà connecté, aller au dashboard
    window.addEventListener('load', async () => {
      const user = await Auth.getCurrentUser();
      if (user) {
        console.log('[Login] Already logged in, redirecting...');
        window.location.href = '/dashboard.html';
      }
    });
  </script>
</body>
</html>
