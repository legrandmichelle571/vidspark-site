<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VidSpark AI — Sélectionner une chaîne</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0B0F19; --s1:#0c1220; --s2:#141c2e; --b1:rgba(255,255,255,.06); --b2:rgba(255,255,255,.10);
      --text:#eaecf3; --muted:#8b92a7; --accent:#FF9D1F; --accent-2:#ff7a18; --accent-l:#ffb85c;
      --radius:16px; --radius-sm:12px; --radius-xs:10px; --shadow-sm:0 8px 24px -12px rgba(0,0,0,.6);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background:
        radial-gradient(1100px 520px at 78% -8%, rgba(255,157,31,.08), transparent 60%),
        radial-gradient(900px 480px at 0% 0%, rgba(96,165,250,.06), transparent 55%),
        var(--bg);
      background-attachment: fixed;
      color: var(--text);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      letter-spacing: -.01em;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .fade-in{ animation: vsFadeIn .5s ease both; }
    @keyframes vsFadeIn{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }
    @media (prefers-reduced-motion: reduce){ .fade-in{ animation:none; } }
    .container {
      max-width: 500px;
      width: 100%;
      background: linear-gradient(165deg, rgba(255,255,255,.055), rgba(255,255,255,.018));
      border: 1px solid var(--b2);
      border-radius: var(--radius);
      padding: 40px;
      text-align: center;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow-sm);
    }
    .logo { font-size: 48px; margin-bottom: 20px; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
    p { color: var(--muted); margin-bottom: 30px; font-size: 14px; }

    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    select, input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,.03);
      color: var(--text);
      border: 1px solid var(--b1);
      border-radius: var(--radius-xs);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    select:focus, input:focus {
      outline: none;
      border-color: rgba(255,157,31,.32);
      box-shadow: 0 0 0 3px rgba(255,157,31,.13);
    }

    .channels-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 20px;
      padding: 10px;
      background: rgba(255,255,255,.03);
      border-radius: var(--radius-xs);
      border: 1px solid var(--b1);
    }

    .channel-item {
      padding: 12px;
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: var(--radius-xs);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .channel-item:hover {
      border-color: rgba(255,157,31,.32);
      background: rgba(255,255,255,.05);
    }

    .channel-item input[type="checkbox"] {
      width: auto;
      margin: 0;
    }

    .channel-info {
      flex: 1;
      text-align: left;
    }

    .channel-name {
      font-weight: 600;
      font-size: 14px;
    }

    .channel-id {
      font-size: 12px;
      color: var(--muted);
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0b0f19;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      font-weight: 700;
      cursor: pointer;
      font-size: 13.5px;
      transition: all .2s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 8px 22px -8px rgba(255,157,31,.3);
    }

    .btn:hover { filter: brightness(1.06); transform: translateY(-1px); }
    .btn:disabled { background: rgba(255,255,255,.08); color: var(--muted); box-shadow: none; cursor: not-allowed; transform:none; }

    .loading { display: none; text-align: center; padding: 20px; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,157,31,.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 12px;
      border-radius: var(--radius-xs);
      margin-bottom: 20px;
      font-size: 14px;
    }

    .info-text {
      background: rgba(255,157,31,.1);
      border-left: 3px solid var(--accent);
      padding: 12px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--accent-l);
    }
    .app-main{ margin-left:270px; transition:margin-left .28s cubic-bezier(.4,0,.2,1); }
    body.side-collapsed .app-main{ margin-left:72px; }
    @media(max-width:1024px){ .app-main, body.side-collapsed .app-main{ margin-left:0; } }
  </style>

<body>
  <!-- Navigation chrome injected by js/app-shell.js (VidSparkShell.mount) -->
  <div class="app-main">
  <div class="container fade-in">
    <div class="logo">⚡</div>
    <h1>VidSpark AI</h1>
    <p data-i18n="ch_sub">Sélectionnez votre chaîne YouTube</p>

    <div id="error" class="error" style="display: none;"></div>

    <div id="content">
      <div class="info-text" id="planInfo"></div>

      <!-- Mode GRATUIT/PRO: Dropdown simple -->
      <div id="simpleMode" style="display: none;">
        <div class="form-group">
          <label for="channelSelect" data-i18n="ch_choose">Choisir une chaîne:</label>
          <select id="channelSelect">
            <option value="" data-i18n="ch_select_opt">-- Sélectionner une chaîne --</option>
          </select>
        </div>
      </div>

      <!-- Mode BUSINESS/DIAMANT: ajout manuel de plusieurs chaînes -->
      <div id="businessMode" style="display: none;">
        <div class="form-group">
          <label id="multiLabel" data-i18n="ch_multilabel">Ajouter vos chaînes YouTube :</label>
          <div style="display:flex; gap:8px;">
            <input id="multiChannelInput" type="text" placeholder="ex: https://youtube.com/@maChaine">
            <button type="button" id="addChannelBtn" class="btn" style="width:auto; padding:12px 18px; white-space:nowrap;" data-i18n="ch_add">+ Ajouter</button>
          </div>
          <p style="font-size: 12px; color: #8888a0; margin-top: 8px;" data-i18n="ch_hint">
            👉 Colle le <strong>lien de ta chaîne</strong> (<em>youtube.com/@maChaine</em>) — ou même le <strong>lien d'une de tes vidéos</strong>, on remonte à la chaîne.

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script src="/js/app-shell.js"></script>
  <script>
    // supabaseClient est déjà créé dans js/auth.js, on le réutilise
    const BACKEND_URL = 'https://vidspark-ai-production-9ac7.up.railway.app/api';

    let currentUserPlan = 'free';
    let availableChannels = [];
    let selectedChannels = [];
    const PLAN_LIMITS = { free: 1, pro: 1, business: 5, diamant: 10 };
    let maxChannels = 1;

    // Charger les chaînes YouTube de l'utilisateur
    async function loadChannels() {
      try {
        setLoading(true);

        // Récupérer l'utilisateur
        const user = await Auth.getCurrentUser();
        if (!user) {
          showError(t('ch_err_not_auth'));
          setLoading(false);
          return;
        }

        const session = await Auth.getSession();
        const token = session?.access_token;
        if (!token) {
          showError(t('ch_err_token'));
          setLoading(false);
          return;
        }

        // Récupérer le plan de l'utilisateur (route /user/plan)
        const userRes = await fetch(`${BACKEND_URL}/user/plan`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!userRes.ok) {
          throw new Error('Failed to fetch user data');
        }

        const userData = await userRes.json();
        currentUserPlan = userData.plan || 'free';

        // Afficher les infos du plan
        const planInfo = {
          free: t('ch_plan_free'),
          pro: t('ch_plan_pro'),
          business: t('ch_plan_business'),
          diamant: t('ch_plan_diamant')
        };
        document.getElementById('planInfo').textContent = planInfo[currentUserPlan] || planInfo.free;
        maxChannels = PLAN_LIMITS[currentUserPlan] || 1;

        // Afficher le formulaire approprié selon le plan (multi-chaînes pour Business et Diamant)
        if (currentUserPlan === 'business' || currentUserPlan === 'diamant') {
          document.getElementById('businessMode').style.display = 'block';
          document.getElementById('maxCount').textContent = maxChannels;
          document.getElementById('multiLabel').textContent = t('ch_multi_n').replace('{n}', maxChannels);
          setupBusinessMode();
        } else {
          document.getElementById('simpleMode').style.display = 'block';
          // Remplacer le dropdown par un input manuel
          const container = document.querySelector('#simpleMode .form-group');
          if (container) {
            container.innerHTML = `
              <label for="manualChannelId">${t('ch_manual_label')}</label>
              <input id="manualChannelId" type="text" placeholder="ex: https://youtube.com/@maChaine">
              <p style="font-size: 12px; color: #8888a0; margin-top: 8px;">${t('ch_hint')}</p>
            `;
          }
          setupSimpleMode();
        }

        availableChannels = [];
        setLoading(false);

      } catch (err) {
        console.error('Erreur loadChannels:', err);
        showError(t('ch_err_load') + ': ' + err.message);
        setLoading(false);
      }
    }

    function setupSimpleMode() {
      document.getElementById('submitBtn').addEventListener('click', submitSimpleMode);
    }

    function setupBusinessMode() {
      document.getElementById('addChannelBtn').addEventListener('click', addChannel);
      document.getElementById('multiChannelInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); addChannel(); }
      });
      document.getElementById('submitBtn').addEventListener('click', submitBusinessMode);
    }

    // Analyse un lien OU un ID de chaîne YouTube et renvoie {id, name} (ou null)
    function parseChannelInput(raw) {
      let s = (raw || '').trim();
      if (!s) return null;
      // Décoder les liens dont le handle est en %xx (arabe, cyrillique…) :
      // youtube.com/@%D8%B4%D8%A7%D9%87… → youtube.com/@شاهد…
      let dec = s;
      try { dec = decodeURIComponent(s); } catch (e) {}
      // 1) ID de chaîne (UC + 22) — direct ou dans une URL /channel/UC...
      let m = dec.match(/UC[a-zA-Z0-9_-]{22}/);
      if (m) return { id: m[0], name: m[0] };
      // 2) Handle : @nom (bare ou dans youtube.com/@nom) — lettres Unicode acceptées
      let h = dec.match(/@[\p{L}\p{N}._-]{2,}/u);
      if (h) return { id: h[0], name: h[0] };
      // 3) URL personnalisée : /c/Nom ou /user/Nom
      let c = dec.match(/\/(?:c|user)\/([\p{L}\p{N}._-]+)/u);
      if (c) return { id: c[1], name: c[1] };
      // 4) Lien d'une VIDÉO (watch?v=, youtu.be/, /shorts/, /live/) → le backend remonte à la chaîne
      let v = dec.match(/(?:[?&]v=|youtu\.be\/|\/shorts\/|\/live\/|\/embed\/)([a-zA-Z0-9_-]{11})/);
      if (v) return { id: 'video:' + v[1], name: t('ch_video_channel') };
      return null;
    }

    // Ajouter une chaîne (lien OU ID collé)
    function addChannel() {
      const input = document.getElementById('multiChannelInput');
      document.getElementById('error').style.display = 'none';

      const parsed = parseChannelInput(input.value);
      if (!parsed) {
        showError(t('ch_err_invalid_link'));
        return;
      }
      if (selectedChannels.some(ch => ch.id === parsed.id)) {
        showError(t('ch_err_already_added')); return;
      }
      if (selectedChannels.length >= maxChannels) {
        showError(t('ch_err_max').replace('{n}', maxChannels)); return;
      }

      selectedChannels.push(parsed);
      input.value = '';
      renderSelected();
    }

    // Retirer une chaîne de la liste
    function removeChannel(id) {
      selectedChannels = selectedChannels.filter(ch => ch.id !== id);
      renderSelected();
    }

    // Afficher la liste des chaînes ajoutées
    function renderSelected() {
      const grid = document.getElementById('channelsGrid');
      grid.style.display = selectedChannels.length ? 'block' : 'none';
      grid.innerHTML = selectedChannels.map(ch => `
        <div class="channel-item">
          <div class="channel-info">
            <div class="channel-name">${ch.name}</div>
            <div class="channel-id">${ch.id}</div>
          </div>
          <button type="button" onclick="removeChannel('${ch.id}')" style="background:transparent;border:1px solid var(--b2);color:#f87171;border-radius:10px;padding:4px 10px;cursor:pointer;font-size:12px;font-family:inherit;">${t('ch_remove')}</button>
        </div>
      `).join('');
      document.getElementById('selectedCount').textContent = selectedChannels.length;
    }

    async function submitSimpleMode() {
      try {
        // Récupérer et analyser le lien/ID depuis l'input manuel
        const channelIdInput = document.getElementById('manualChannelId');
        const parsed = parseChannelInput(channelIdInput?.value);

        if (!parsed) {
          showError(t('ch_err_invalid_link'));
          return;
        }

        // Soumettre le formulaire
        await submitChannelSelection([parsed]);
      } catch (err) {
        console.error('Erreur submitSimpleMode:', err);
        showError('Erreur: ' + err.message);
      }
    }

    async function submitBusinessMode() {
      if (selectedChannels.length === 0) {
        showError(t('ch_err_select_one'));
        return;
      }

      await submitChannelSelection(selectedChannels);
    }

    // Construit une URL YouTube à partir de l'id analysé (@handle, UC..., video:..)
    function buildChannelUrl(id) {
      if (/^UC[a-zA-Z0-9_-]{22}$/.test(id)) return 'https://www.youtube.com/channel/' + id;
      if (id.startsWith('@'))       return 'https://www.youtube.com/' + id;
      if (id.startsWith('video:'))  return 'https://www.youtube.com/watch?v=' + id.slice(6);
      return 'https://www.youtube.com/' + id.replace(/^\//, '');
    }

    async function submitChannelSelection(channels) {
      try {
        setLoading(true);

        const session = await Auth.getSession();
        const token = session?.access_token;
        const headers = {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        };

        // 1) Supprimer les chaînes existantes pour permettre le remplacement
        //    (même table que le dashboard : activation_channels via /user/channels)
        try {
          const exRes = await fetch(`${BACKEND_URL}/user/channels`, { headers });
          const exData = await exRes.json();
          for (const c of (exData.channels || [])) {
            await fetch(`${BACKEND_URL}/user/channels/${encodeURIComponent(c.channel_id)}`, {
              method: 'DELETE', headers
            });
          }
        } catch (e) { /* pas bloquant */ }

        // 2) Ajouter les nouvelles chaînes (le backend résout @handle / lien vidéo en UC...)
        for (const ch of channels) {
          const isUC = /^UC[a-zA-Z0-9_-]{22}$/.test(ch.id);
          const body = isUC
            ? { channel_id: ch.id, channel_name: ch.name }
            : { channel_url: buildChannelUrl(ch.id),
                channel_name: (ch.name && !/^@|^Chaîne /.test(ch.name)) ? ch.name : undefined };

          const res = await fetch(`${BACKEND_URL}/user/channels`, {
            method: 'POST', headers, body: JSON.stringify(body)
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || t('ch_err_add'));
        }

        // Succès! Aller au dashboard
        window.location.href = '/dashboard.html';

      } catch (err) {
        console.error('Erreur:', err);
        showError(t('ch_err_select') + ': ' + err.message);
        setLoading(false);
      }
    }

    function showError(msg) {
      const errorEl = document.getElementById('error');
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }

    function setLoading(show) {
      document.getElementById('content').style.display = show ? 'none' : 'block';
      document.getElementById('loading').style.display = show ? 'block' : 'none';
    }

    // Charger au démarrage
    window.addEventListener('DOMContentLoaded', loadChannels);
    if (window.VidSparkShell) VidSparkShell.mount({ active: 'channels', title: t ? t('sb_channels') : 'Mes chaînes', subtitle: '' });
  </script>
  </div><!-- /.app-main -->
</body>
</html>
