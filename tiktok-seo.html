<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidSpark AI — SEO TikTok</title>
<script src="/js/meta-pixel.js"></script>
<link rel="stylesheet" href="/css/app-shell.css">
<link rel="stylesheet" href="/css/tool-page.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--shell-bg,#0B0F19);min-height:100vh;font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/auth.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/tool-page.js"></script>
<script>
const API_BASE = 'https://vidspark-ai-production-9ac7.up.railway.app';

/* Définition des 5 outils : champs + endpoint + rendu
   (tip/outcomes = métadonnées d'affichage pour la sidebar/l'empty state, ignorées par run()/RENDER) */
const TOOLS = {
  seo:      { label:'📝 SEO complet', ep:'/api/ai/tiktok-seo',
              fields:[['topic','Sujet de ta vidéo *','input'],['niche','Niche (optionnel)','input'],['description','Contexte (optionnel)','textarea']],
              tip:'Un bon hook dans les 3 premières secondes fait toute la différence sur TikTok : sois précis sur le sujet pour que l’IA cible juste.',
              outcomes:['Légende','Hooks','Hashtags','Mots-clés','Script','Conseils'] },
  repurpose:{ label:'♻️ YouTube → TikTok', ep:'/api/ai/tiktok-repurpose',
              fields:[['url','Lien de la vidéo YouTube *','input']],
              tip:'Colle le lien d’une vidéo YouTube existante : l’IA repère les meilleurs extraits à recycler en clips courts.',
              outcomes:['Clips + timecodes','Hooks','Légendes','Hashtags'] },
  ideas:    { label:'🔥 Idées virales', ep:'/api/ai/tiktok-tool', tool:'ideas',
              fields:[['niche','Niche','input'],['topic','Sujet/angle (optionnel)','input']],
              tip:'Plus la niche est précise (ex : "cuisine végane rapide" plutôt que "cuisine"), plus les idées générées seront exploitables.',
              outcomes:['Idées virales notées'] },
  hooks:    { label:'🪝 Hooks', ep:'/api/ai/tiktok-tool', tool:'hooks',
              fields:[['topic','Sujet de ta vidéo *','input'],['niche','Niche (optionnel)','input']],
              tip:'Teste plusieurs hooks générés en A/B sur tes prochaines vidéos pour voir lequel retient le mieux l’audience.',
              outcomes:['Hooks notés'] },
  calendar: { label:'📅 Calendrier', ep:'/api/ai/tiktok-tool', tool:'calendar',
              fields:[['niche','Niche','input'],['frequency','Rythme (ex : 1 vidéo/jour)','input']],
              tip:'La régularité compte plus que le volume : un rythme réaliste que tu peux tenir sur plusieurs semaines bat un pic ponctuel.',
              outcomes:['Calendrier 7 jours'] }
};
let current = 'seo';

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function copy(txt,btn){navigator.clipboard.writeText(txt).then(()=>{const t=btn.textContent;btn.textContent='✓ Copié';setTimeout(()=>btn.textContent=t,1400);});}

function renderTools(){
  document.getElementById('tools').innerHTML = Object.entries(TOOLS)
    .map(([k,v])=>`<button class="tool ${k===current?'active':''}" onclick="selectTool('${k}')">${v.label}</button>`).join('');
}
function renderForm(){
  const t = TOOLS[current];
  const inputs = t.fields.map(([id,lbl,type])=>{
    const style='';
    if(type==='textarea') return `<label>${lbl}</label><textarea id="f_${id}" placeholder="${lbl.replace(' *','')}…"></textarea>`;
    return `<label>${lbl}</label><input id="f_${id}" placeholder="${lbl.replace(' *','')}…" maxlength="200">`;
  }).join('');
  document.getElementById('form').innerHTML = `
    <div class="tp-form-head">
      <div class="tp-form-title">⚙️ Paramètres</div>
      <div class="tp-form-sub">Renseigne les champs ci-dessous, puis clique sur « Générer ».</div>
    </div>
    <div class="tp-form-fields">${inputs}</div>
    <div class="tp-divider"></div>
    <div class="tp-form-fields">
      <label>Langue</label>
      <select id="f_lang">
        <option value="fr">Français</option><option value="en">English</option>
        <option value="es">Español</option><option value="ar">العربية</option>
        <option value="pt">Português</option><option value="de">Deutsch</option>
      </select>
    </div>`;
}
function selectTool(k){ current=k; document.getElementById('out').innerHTML=emptyStateHTML(k); renderTools(); renderForm(); syncSidebar(); }

/* ── Sidebar + zone de résultats (layout-only helpers — aucune logique métier) ── */
function syncSidebar(){
  if(!window.shell) return;
  const t = TOOLS[current];
  shell.updateCard('tips', `<p>💡 ${esc(t.tip||'')}</p>`);
  shell.updateCard('outcome', `<div class="tag-wrap">${(t.outcomes||[]).map(o=>`<span class="tag">${esc(o)}</span>`).join('')}</div>`);
}
function emptyStateHTML(k){
  const t = TOOLS[k];
  const ic = (t.label.match(/^\S+/)||['✨'])[0];
  return `<div class="tp-out-empty">
    <div class="ic">${ic}</div>
    <div class="tt">Ton résultat apparaîtra ici</div>
    <div class="sb">Remplis le formulaire ci-dessus puis clique sur « Générer » pour obtenir :</div>
    <div class="list">${(t.outcomes||[]).map(o=>`<span class="badge">${esc(o)}</span>`).join('')}</div>
  </div>`;
}
function bumpSessionStats(){
  const n = (parseInt(sessionStorage.getItem('vs_tiktok_gens')||'0',10) || 0) + 1;
  sessionStorage.setItem('vs_tiktok_gens', String(n));
  if(window.shell) shell.updateCard('stats', `<div class="tp-stat-row"><span class="lb">Générations cette session</span><span class="vl">${n}</span></div>`);
}
function updatePreviewCard(){
  if(!window.shell) return;
  const label = TOOLS[current].label.replace(/^[^\s]+\s/,'');
  shell.updateCard('preview', `
    <p>✅ Dernier résultat : <b>${esc(label)}</b></p>
    <p><a href="#out">Voir le résultat ↓</a></p>`);
}

/* Monte le layout partagé (topbar + grille 2 colonnes + sidebar) */
window.shell = ToolPage.mount({
  icon:'🎵', title:'SEO TikTok',
  subtitle:'Suite complète pour percer sur TikTok — propulsée par IA.',
  meta:[
    { icon:'🤖', text:'Propulsé par IA' },
    { icon:'⚡', text:Object.keys(TOOLS).length+' outils' },
    { icon:'🌍', text:'6 langues' }
  ],
  sidebar:[
    { id:'tips', icon:'💡', title:'Conseil', html:`<p>💡 ${esc(TOOLS[current].tip)}</p>` },
    { id:'outcome', icon:'📦', title:'Ce que tu vas obtenir', html:`<div class="tag-wrap">${(TOOLS[current].outcomes||[]).map(o=>`<span class="tag">${esc(o)}</span>`).join('')}</div>` },
    { id:'preview', icon:'📄', title:'Dernier résultat', html:'<div class="tp-empty-hint">Rien pour l’instant — génère un premier résultat.</div>' },
    { id:'practices', icon:'✅', title:'Bonnes pratiques TikTok', html:`<ul>
        <li>⏱️ Vise 15–34 s pour un meilleur taux de complétion</li>
        <li>🪝 Accroche dès la 1ʳᵉ seconde, avant tout logo</li>
        <li>🔁 Régularité plutôt que publication en rafale</li>
        <li>🎯 3–5 hashtags ciblés valent mieux que 15 génériques</li>
      </ul>` },
    { id:'stats', icon:'📊', title:'Cette session', html:`<div class="tp-stat-row"><span class="lb">Générations cette session</span><span class="vl">${parseInt(sessionStorage.getItem('vs_tiktok_gens')||'0',10)}</span></div>` },
    { id:'shortcuts', icon:'🔗', title:'Raccourcis', html:`<ul>
        <li><a href="/dashboard.html">🏠 Tableau de bord <span>›</span></a></li>
        <li><a href="/diamant.html">✦ Studio <span>›</span></a></li>
        <li><a href="/outils.html">🛠️ Outils gratuits <span>›</span></a></li>
      </ul>` }
  ]
});
shell.main.innerHTML = `
  <div class="tp-panel">
    <nav class="tools" id="tools"></nav>
    <div class="tp-panel-body" id="form"></div>
  </div>
  <button class="btn" id="go" onclick="run()">✨ Générer</button>
  <div id="out"></div>`;
document.getElementById('out').innerHTML = emptyStateHTML(current);

/* Exige une connexion */
(async function(){
  renderTools(); renderForm();
  try{
    const s = await (window.Auth?.getSession?.() || Promise.resolve(null));
    if(!s?.access_token){
      document.getElementById('out').innerHTML='<div class="empty">🔒 Connecte-toi pour utiliser les outils TikTok.<br><br><a href="/login.html">Se connecter →</a></div>';
      document.getElementById('go').disabled=true;
    }
  }catch(e){}
})();

async function run(){
  const t = TOOLS[current];
  const out = document.getElementById('out'), btn = document.getElementById('go');
  const body = { language: document.getElementById('f_lang').value };
  t.fields.forEach(([id])=>{ body[id] = (document.getElementById('f_'+id)?.value||'').trim(); });
  if(t.tool) body.tool = t.tool;

  const reqField = t.fields.find(f=>f[1].includes('*'));
  if(reqField && (body[reqField[0]]||'').length<2){ out.innerHTML='<div class="err">Remplis le champ obligatoire (*).</div>'; return; }

  btn.disabled=true; btn.innerHTML='<span class="spin"></span> Génération…';
  out.innerHTML='<div class="empty">🎬 L’IA travaille…</div>';
  try{
    const s = await Auth.getSession();
    const token = s?.access_token;
    if(!token){ out.innerHTML='<div class="err">Session expirée — <a href="/login.html">reconnecte-toi</a>.</div>'; return; }
    const res = await fetch(API_BASE + t.ep, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
      body:JSON.stringify(body)
    });
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e.error||('Erreur '+res.status)); }
    const data = await res.json();
    RENDER[current](data, out);
    if(typeof fbq==='function') fbq('trackCustom','TikTokToolUsed',{tool:current});
    updatePreviewCard();
    bumpSessionStats();
  }catch(err){ out.innerHTML='<div class="err">❌ '+esc(err.message)+'</div>'; }
  finally{ btn.disabled=false; btn.innerHTML='✨ Générer'; }
}

function chips(arr,cls){ return '<div class="chips">'+(arr||[]).map(h=>`<span class="chip ${cls||''}">${esc(h)}</span>`).join('')+'</div>'; }

const RENDER = {
  seo(d,out){
    const ht=d.hashtags||{}; const all=[].concat(ht.broad||[],ht.niche||[],ht.trending||[]).join(' ');
    out.innerHTML=`<div class="card">
      <div class="sec"><div class="hd"><h3>📝 Légende</h3><button class="btn-mini" onclick='copy(${JSON.stringify(d.caption||"")},this)'>📋 Copier</button></div><div class="cap">${esc(d.caption)}</div></div>
      <div class="sec"><h3>🪝 Hooks</h3>${(d.hooks||[]).map(h=>`<div class="item">${esc(h)}</div>`).join('')}</div>
      <div class="sec"><div class="hd"><h3># Hashtags</h3><button class="btn-mini" onclick='copy(${JSON.stringify(all)},this)'>📋 Tout</button></div>
        <div class="htcat"><div class="lbl">Larges</div>${chips(ht.broad)}</div>
        <div class="htcat"><div class="lbl">Niche</div>${chips(ht.niche)}</div>
        <div class="htcat"><div class="lbl">Tendance</div>${chips(ht.trending)}</div></div>
      <div class="sec"><h3>🔎 Mots-clés</h3>${chips(d.keywords,'k')}</div>
      <div class="sec"><h3>🎬 Script</h3>${(d.script||[]).map(s=>`<div class="step"><div class="p">${esc(s.part)}</div><div>${esc(s.content)}</div></div>`).join('')}</div>
      ${d.sound_advice?`<div class="sec"><h3>🎧 Son</h3><div class="cap">${esc(d.sound_advice)}</div></div>`:''}
      <div class="sec"><h3>🚀 Conseils</h3>${[].concat(d.posting_tips||[],d.discoverability_tips||[]).map(t=>`<div class="item">${esc(t)}</div>`).join('')}</div>
    </div>`;
  },
  repurpose(d,out){
    const clips=d.clips||[];
    const head = d.video?.title ? `<div class="muted" style="margin-bottom:12px;">🎬 ${esc(d.video.title)}${d.video.duration?` · ${esc(d.video.duration)}`:''}</div>` : '';
    out.innerHTML=`<div class="card">${head}${clips.map((c,i)=>`
      <div class="sec">
        <h3>▶️ Clip ${i+1} <span class="chip p" style="font-size:13px;">✂️ ${esc(c.start||'?')} → ${esc(c.end||'?')}</span></h3>
        <div class="item">
          <div class="muted" style="font-size:12px;">${esc(c.angle||'')}</div>
          <b style="display:block;margin-top:4px;">🪝 ${esc(c.hook||'')}</b>
          <div class="cap" style="margin-top:8px;">${esc(c.caption||'')}</div>${chips(c.hashtags,'p')}
          <button class="btn-mini" style="margin-top:8px;" onclick='copy(${JSON.stringify((c.caption||"")+" "+((c.hashtags||[]).join(" ")))},this)'>📋 Copier</button>
        </div>
      </div>`).join('')}</div>`;
  },
  ideas(d,out){
    out.innerHTML=`<div class="card"><div class="sec"><h3>🔥 Idées virales</h3>${(d.ideas||[]).map((it,i)=>`
      <div class="item"><span class="score">${it.viral_score||'—'}</span><b>${i+1}. ${esc(it.title||'')}</b>
        ${it.format?`<span class="badge">${esc(it.format)}</span>`:''}
        ${it.hook?`<div style="margin-top:4px;">🪝 ${esc(it.hook)}</div>`:''}
        ${it.why?`<div class="muted" style="font-size:12px;margin-top:2px;">✅ ${esc(it.why)}</div>`:''}</div>`).join('')}</div></div>`;
  },
  hooks(d,out){
    const best=d.best_index;
    out.innerHTML=`<div class="card"><div class="sec"><h3>🪝 Hooks (les 3 premières secondes)</h3>${(d.hooks||[]).map((h,i)=>`
      <div class="item ${i===best?'best':''}"><span class="score">${h.score||'—'}</span>${i===best?'⭐ ':''}${esc(h.text||'')}
        ${h.type?`<div><span class="badge">${esc(h.type)}</span></div>`:''}</div>`).join('')}
      ${d.tip?`<div class="muted" style="margin-top:10px;">💡 ${esc(d.tip)}</div>`:''}</div></div>`;
  },
  calendar(d,out){
    out.innerHTML=`<div class="card"><div class="sec"><h3>📅 Calendrier 7 jours</h3>${(d.schedule||[]).map(s=>`
      <div class="item"><b style="color:var(--purple)">${esc(s.day||'')}</b> ${s.best_time?`<span class="muted">· ${esc(s.best_time)}</span>`:''}
        <div style="margin-top:3px;">${esc(s.idea||'')}</div>
        ${s.format?`<span class="badge">${esc(s.format)}</span>`:''}
        ${s.hook?`<div style="margin-top:4px;">🪝 ${esc(s.hook)}</div>`:''}</div>`).join('')}</div></div>`;
  }
};
</script>
</body>
</html>
