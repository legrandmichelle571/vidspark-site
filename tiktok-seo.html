  tks_preview_empty:{fr:'Rien pour l’instant — génère un premier résultat.',en:'Nothing yet — generate a first result.',es:'Nada por ahora — genera un primer resultado.',ar:'لا شيء بعد — ولّد أول نتيجة.'},
  tks_auth_required:{fr:'Connecte-toi pour utiliser les outils TikTok.',en:'Sign in to use the TikTok tools.',es:'Inicia sesión para usar las herramientas de TikTok.',ar:'سجّل الدخول لاستخدام أدوات تيك توك.'},
  tks_err_required:{fr:'Remplis le champ obligatoire (*).',en:'Fill in the required field (*).',es:'Completa el campo obligatorio (*).',ar:'املأ الحقل المطلوب (*).'},

  practice4:{fr:'3–5 hashtags ciblés valent mieux que 15 génériques',en:'3–5 targeted hashtags beat 15 generic ones',es:'3–5 hashtags específicos valen más que 15 genéricos',ar:'3–5 وسوم مستهدفة أفضل من 15 وسمًا عامًا'},

  tip_seo:{fr:'Un bon hook dans les 3 premières secondes fait toute la différence sur TikTok : sois précis sur le sujet pour que l’IA cible juste.',en:'A strong hook in the first 3 seconds makes all the difference on TikTok — be specific about the topic so the AI can target it accurately.',es:'Un buen gancho en los primeros 3 segundos marca la diferencia en TikTok: sé preciso con el tema para que la IA acierte.',ar:'خطّاف قوي في أول 3 ثوانٍ يصنع كل الفرق على تيك توك: كن دقيقًا في الموضوع ليتمكّن الذكاء الاصطناعي من الاستهداف الصحيح.'},

  tip_ideas:{fr:'Plus la niche est précise (ex : "cuisine végane rapide" plutôt que "cuisine"), plus les idées générées seront exploitables.',en:'The more specific the niche (e.g. "quick vegan cooking" rather than "cooking"), the more usable the generated ideas will be.',es:'Cuanto más específico sea el nicho (ej: "cocina vegana rápida" en vez de "cocina"), más útiles serán las ideas generadas.',ar:'كلما كان المجال أكثر تحديدًا (مثال: "طبخ نباتي سريع" بدل "طبخ")، كانت الأفكار المولّدة أكثر قابلية للاستخدام.'},
  tip_hooks:{fr:'Teste plusieurs hooks générés en A/B sur tes prochaines vidéos pour voir lequel retient le mieux l’audience.',en:'A/B test several generated hooks on your next videos to see which one retains the audience best.',es:'Prueba varios ganchos generados en A/B en tus próximos vídeos para ver cuál retiene mejor a la audiencia.',ar:'اختبر عدّة خطّافات مولَّدة بأسلوب A/B في فيديوهاتك القادمة لمعرفة أيّها يحافظ على الجمهور بشكل أفضل.'},
  tip_calendar:{fr:'La régularité compte plus que le volume : un rythme réaliste que tu peux tenir sur plusieurs semaines bat un pic ponctuel.',en:'Consistency matters more than volume: a realistic pace you can sustain for weeks beats a one-time spike.',es:'La regularidad importa más que el volumen: un ritmo realista que puedas mantener durante semanas gana a un pico puntual.',ar:'الانتظام أهم من الكمّية: وتيرة واقعية يمكنك الحفاظ عليها لأسابيع أفضل من اندفاعة مؤقتة.'}

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function copy(txt,btn){navigator.clipboard.writeText(txt).then(()=>{const orig=btn.textContent;btn.textContent='✓ '+t('tks_copied');setTimeout(()=>btn.textContent=orig,1400);});}

function renderTools(){
  document.getElementById('tools').innerHTML = Object.keys(TOOLS)
    .map(k=>`<button class="tool ${k===current?'active':''}" onclick="selectTool('${k}')">${TAB_META[k].icon} ${t(TAB_META[k].key)}</button>`).join('');
}
function renderForm(){
  const toolDef = TOOLS[current];
  const inputs = toolDef.fields.map(([id,lbl,type])=>{
    const dispLbl = t(FIELD_LABEL_I18N[lbl]||lbl);
    const ph = dispLbl.replace(/\s*\*$/,'')+'…';
    if(type==='textarea') return `<label>${dispLbl}</label><textarea id="f_${id}" placeholder="${ph}"></textarea>`;
    return `<label>${dispLbl}</label><input id="f_${id}" placeholder="${ph}" maxlength="200">`;
  }).join('');
  document.getElementById('form').innerHTML = `
    <div class="tp-form-head">
      <div class="tp-form-title">⚙️ ${t('tks_params')}</div>
      <div class="tp-form-sub">${t('tks_form_sub')}</div>
    </div>
    <div class="tp-form-fields">${inputs}</div>
    <div class="tp-divider"></div>
    <div class="tp-form-fields">
      <label>${t('tks_lang_label')}</label>
      <select id="f_lang">
        <option value="fr">Français</option><option value="en">English</option>
        <option value="es">Español</option><option value="ar">العربية</option>
        <option value="pt">Português</option><option value="de">Deutsch</option>
        <option value="it">Italiano</option><option value="ru">Русский</option>
        <option value="ja">日本語</option><option value="ko">한국어</option>
        <option value="hi">हिन्दी</option><option value="zh">中文</option>
        <option value="tr">Türkçe</option><option value="nl">Nederlands</option>
      </select>
    </div>`;
}
function selectTool(k){ current=k; document.getElementById('out').innerHTML=emptyStateHTML(k); renderTools(); renderForm(); syncSidebar(); }

/* ── Sidebar + zone de résultats (layout-only helpers — aucune logique métier) ── */
function syncSidebar(){
  if(!window.shell) return;
  const toolDef = TOOLS[current];
  shell.updateCard('tips', `<p>💡 ${t(toolDef.tipKey)}</p>`);
  shell.updateCard('outcome', `<div class="tag-wrap">${(toolDef.outcomes||[]).map(ok=>`<span class="tag">${t(ok)}</span>`).join('')}</div>`);
}
function emptyStateHTML(k){
  const meta = TAB_META[k];
  return `<div class="tp-out-empty">
    <div class="ic">${meta.icon}</div>
    <div class="tt">${t('tks_empty_title')}</div>
    <div class="sb">${t('tks_empty_sub')}</div>
    <div class="list">${(TOOLS[k].outcomes||[]).map(ok=>`<span class="badge">${t(ok)}</span>`).join('')}</div>
  </div>`;
}
function bumpSessionStats(){
  const n = (parseInt(sessionStorage.getItem('vs_tiktok_gens')||'0',10) || 0) + 1;
  sessionStorage.setItem('vs_tiktok_gens', String(n));
  if(window.shell) shell.updateCard('stats', `<div class="tp-stat-row"><span class="lb">${t('tks_session_count')}</span><span class="vl">${n}</span></div>`);
}
function updatePreviewCard(){
  if(!window.shell) return;
  const meta = TAB_META[current];
  shell.updateCard('preview', `
    <p>✅ ${t('tks_sc_preview')} : <b>${meta.icon} ${t(meta.key)}</b></p>
    <p><a href="#out">${t('tks_see_result')} ↓</a></p>`);
}

/* Monte le layout partagé (topbar + grille 2 colonnes + sidebar) */
window.shell = ToolPage.mount({
  icon:'🎵', title:'SEO TikTok',
  subtitle:t('tks_subtitle'),
  meta:[
    { icon:'🤖', text:t('tks_ai') },
    { icon:'⚡', text:Object.keys(TOOLS).length+' '+t('tks_tools_word') },
    { icon:'🌍', text:'14 '+t('tks_langs_word') }
  ],
  sidebar:[
    { id:'tips', icon:'💡', title:t('tks_sc_tips'), html:`<p>💡 ${t(TOOLS[current].tipKey)}</p>` },
    { id:'outcome', icon:'📦', title:t('tks_sc_outcome'), html:`<div class="tag-wrap">${(TOOLS[current].outcomes||[]).map(ok=>`<span class="tag">${t(ok)}</span>`).join('')}</div>` },
    { id:'preview', icon:'📄', title:t('tks_sc_preview'), html:`<div class="tp-empty-hint">${t('tks_preview_empty')}</div>` },
    { id:'practices', icon:'✅', title:t('tks_sc_practices'), html:`<ul>
        <li>⏱️ ${t('practice1')}</li>
        <li>🪝 ${t('practice2')}</li>
        <li>🔁 ${t('practice3')}</li>
        <li>🎯 ${t('practice4')}</li>
      </ul>` },
    { id:'stats', icon:'📊', title:t('tks_sc_session'), html:`<div class="tp-stat-row"><span class="lb">${t('tks_session_count')}</span><span class="vl">${parseInt(sessionStorage.getItem('vs_tiktok_gens')||'0',10)}</span></div>` },
    { id:'shortcuts', icon:'🔗', title:t('tks_sc_shortcuts'), html:`<ul>
        <li><a href="/dashboard.html">🏠 ${t('tks_shortcut_dashboard')} <span>›</span></a></li>
        <li><a href="/diamant.html">✦ ${t('tks_shortcut_studio')} <span>›</span></a></li>
        <li><a href="/outils.html">🛠️ ${t('tks_shortcut_tools')} <span>›</span></a></li>
      </ul>` }
  ]
});
shell.main.innerHTML = `
  <div class="tp-panel">
    <nav class="tools" id="tools"></nav>
    <div class="tp-panel-body" id="form"></div>
  </div>
  <button class="btn" id="go" onclick="run()">✨ ${t('tks_generate')}</button>
  <div id="out"></div>`;
document.getElementById('out').innerHTML = emptyStateHTML(current);

/* Exige une connexion */
(async function(){
  renderTools(); renderForm();
  try{
    const s = await (window.Auth?.getSession?.() || Promise.resolve(null));
    if(!s?.access_token){
      document.getElementById('out').innerHTML=`<div class="empty">🔒 ${t('tks_auth_required')}<br><br><a href="/login.html">${t('tks_login_link')} →</a></div>`;
      document.getElementById('go').disabled=true;
    }
  }catch(e){}
})();

async function run(){
  const toolDef = TOOLS[current];
  const out = document.getElementById('out'), btn = document.getElementById('go');
  const body = { language: document.getElementById('f_lang').value };
  toolDef.fields.forEach(([id])=>{ body[id] = (document.getElementById('f_'+id)?.value||'').trim(); });
  if(toolDef.tool) body.tool = toolDef.tool;

  const reqField = toolDef.fields.find(f=>f[1].includes('*'));
  if(reqField && (body[reqField[0]]||'').length<2){ out.innerHTML=`<div class="err">${t('tks_err_required')}</div>`; return; }

  btn.disabled=true; btn.innerHTML=`<span class="spin"></span> ${t('tks_generating')}`;
  out.innerHTML=`<div class="empty">🎬 ${t('tks_ai_working')}</div>`;
  try{
    const s = await Auth.getSession();
    const token = s?.access_token;
    if(!token){ out.innerHTML=`<div class="err">${t('tks_session_expired')} <a href="/login.html">${t('tks_reconnect')}</a>.</div>`; return; }
    const res = await fetch(API_BASE + toolDef.ep, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
      body:JSON.stringify(body)
    });
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e.error||(t('tks_error_generic')+' '+res.status)); }
    const data = await res.json();
    RENDER[current](data, out);
    if(typeof fbq==='function') fbq('trackCustom','TikTokToolUsed',{tool:current});
    updatePreviewCard();
    bumpSessionStats();
  }catch(err){ out.innerHTML='<div class="err">❌ '+esc(err.message)+'</div>'; }
  finally{ btn.disabled=false; btn.innerHTML=`✨ ${t('tks_generate')}`; }
}

function chips(arr,cls){ return '<div class="chips">'+(arr||[]).map(h=>`<span class="chip ${cls||''}">${esc(h)}</span>`).join('')+'</div>'; }

const RENDER = {
  seo(d,out){
    const ht=d.hashtags||{}; const all=[].concat(ht.broad||[],ht.niche||[],ht.trending||[]).join(' ');
    out.innerHTML=`<div class="card">
      <div class="sec"><div class="hd"><h3>📝 ${t('tks_caption')}</h3><button class="btn-mini" onclick='copy(${JSON.stringify(d.caption||"")},this)'>📋 ${t('tks_copy')}</button></div><div class="cap">${esc(d.caption)}</div></div>
      <div class="sec"><h3>🪝 ${t('tks_hooks')}</h3>${(d.hooks||[]).map(h=>`<div class="item">${esc(h)}</div>`).join('')}</div>
      <div class="sec"><div class="hd"><h3># ${t('tks_hashtags')}</h3><button class="btn-mini" onclick='copy(${JSON.stringify(all)},this)'>📋 ${t('tks_copy_all')}</button></div>
        <div class="htcat"><div class="lbl">${t('tks_broad')}</div>${chips(ht.broad)}</div>
        <div class="htcat"><div class="lbl">${t('tks_niche_lbl')}</div>${chips(ht.niche)}</div>
        <div class="htcat"><div class="lbl">${t('tks_trending')}</div>${chips(ht.trending)}</div></div>
      <div class="sec"><h3>🔎 ${t('tks_keywords')}</h3>${chips(d.keywords,'k')}</div>
      <div class="sec"><h3>🎬 ${t('tks_script')}</h3>${(d.script||[]).map(s=>`<div class="step"><div class="p">${esc(s.part)}</div><div>${esc(s.content)}</div></div>`).join('')}</div>
      ${d.sound_advice?`<div class="sec"><h3>🎧 ${t('tks_sound')}</h3><div class="cap">${esc(d.sound_advice)}</div></div>`:''}
      <div class="sec"><h3>🚀 ${t('tks_tips_section')}</h3>${[].concat(d.posting_tips||[],d.discoverability_tips||[]).map(pt=>`<div class="item">${esc(pt)}</div>`).join('')}</div>
    </div>`;
  },
  repurpose(d,out){
    const clips=d.clips||[];
    const head = d.video?.title ? `<div class="muted" style="margin-bottom:12px;">🎬 ${esc(d.video.title)}${d.video.duration?` · ${esc(d.video.duration)}`:''}</div>` : '';
    out.innerHTML=`<div class="card">${head}${clips.map((c,i)=>`
      <div class="sec">
        <h3>▶️ ${t('tks_clip')} ${i+1} <span class="chip p" style="font-size:13px;">✂️ ${esc(c.start||'?')} → ${esc(c.end||'?')}</span></h3>
        <div class="item">
          <div class="muted" style="font-size:12px;">${esc(c.angle||'')}</div>
          <b style="display:block;margin-top:4px;">🪝 ${esc(c.hook||'')}</b>
          <div class="cap" style="margin-top:8px;">${esc(c.caption||'')}</div>${chips(c.hashtags,'p')}
          <button class="btn-mini" style="margin-top:8px;" onclick='copy(${JSON.stringify((c.caption||"")+" "+((c.hashtags||[]).join(" ")))},this)'>📋 ${t('tks_copy')}</button>
        </div>
      </div>`).join('')}</div>`;
  },
  ideas(d,out){
    out.innerHTML=`<div class="card"><div class="sec"><h3>🔥 ${t('tks_tab_ideas')}</h3>${(d.ideas||[]).map((it,i)=>`
      <div class="item"><span class="score">${it.viral_score||'—'}</span><b>${i+1}. ${esc(it.title||'')}</b>
        ${it.format?`<span class="badge">${esc(it.format)}</span>`:''}
        ${it.hook?`<div style="margin-top:4px;">🪝 ${esc(it.hook)}</div>`:''}
        ${it.why?`<div class="muted" style="font-size:12px;margin-top:2px;">✅ ${esc(it.why)}</div>`:''}</div>`).join('')}</div></div>`;
  },
  hooks(d,out){
    const best=d.best_index;
    out.innerHTML=`<div class="card"><div class="sec"><h3>🪝 ${t('tks_hooks_section_title')}</h3>${(d.hooks||[]).map((h,i)=>`
      <div class="item ${i===best?'best':''}"><span class="score">${h.score||'—'}</span>${i===best?'⭐ ':''}${esc(h.text||'')}
        ${h.type?`<div><span class="badge">${esc(h.type)}</span></div>`:''}</div>`).join('')}
      ${d.tip?`<div class="muted" style="margin-top:10px;">💡 ${esc(d.tip)}</div>`:''}</div></div>`;
  },
  calendar(d,out){
    out.innerHTML=`<div class="card"><div class="sec"><h3>📅 ${t('tks_oc_calendar')}</h3>${(d.schedule||[]).map(s=>`
      <div class="item"><b style="color:var(--purple)">${esc(s.day||'')}</b> ${s.best_time?`<span class="muted">· ${esc(s.best_time)}</span>`:''}
        <div style="margin-top:3px;">${esc(s.idea||'')}</div>
        ${s.format?`<span class="badge">${esc(s.format)}</span>`:''}
        ${s.hook?`<div style="margin-top:4px;">🪝 ${esc(s.hook)}</div>`:''}</div>`).join('')}</div></div>`;
  }
};
</script>
