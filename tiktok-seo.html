<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidSpark AI — SEO TikTok</title>
<script src="/js/meta-pixel.js"></script>
<style>
  :root{
    --bg:#0b0f1a; --s1:#111726; --s2:#182033; --b1:#243049; --b2:#2f3d5c;
    --text:#eef2ff; --muted:#93a0bd; --orange:#f7941d; --orange-d:#d97b06;
    --green:#22c55e; --red:#ef4444;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
  body{background:var(--bg);color:var(--text);min-height:100vh;}
  a{color:var(--orange);text-decoration:none;}
  button{cursor:pointer;font-family:inherit;}
  .top{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--b1);background:var(--s1);position:sticky;top:0;z-index:5;}
  .logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;}
  .logo .dot{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--orange),#ffb454);display:flex;align-items:center;justify-content:center;color:#1a1200;font-weight:900;}
  .wrap{max-width:820px;margin:0 auto;padding:24px 18px 60px;}
  h1{font-size:24px;margin-bottom:4px;}
  .sub{color:var(--muted);font-size:14px;margin-bottom:22px;}
  .card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:18px;margin-bottom:16px;}
  label{display:block;font-size:12px;color:var(--muted);margin:10px 0 5px;text-transform:uppercase;letter-spacing:.4px;}
  input,select,textarea{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:9px;padding:11px;color:var(--text);font-size:14px;}
  textarea{resize:vertical;min-height:60px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .row>div{flex:1;min-width:160px;}
  .btn{background:var(--orange);color:#1a1200;border:none;border-radius:10px;padding:13px 20px;font-weight:800;font-size:15px;width:100%;margin-top:16px;}
  .btn:hover{background:var(--orange-d);color:#fff;}
  .btn:disabled{opacity:.6;cursor:not-allowed;}
  .btn-mini{background:var(--s2);border:1px solid var(--b2);color:var(--muted);border-radius:7px;padding:4px 10px;font-size:12px;font-weight:700;}
  .btn-mini:hover{color:var(--text);border-color:var(--orange);}
  .sec{margin-bottom:20px;}
  .sec h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .cap{background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:14px;line-height:1.6;font-size:15px;white-space:pre-wrap;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{background:rgba(247,148,29,.12);color:#ffcf8a;border:1px solid rgba(247,148,29,.3);border-radius:20px;padding:5px 12px;font-size:13px;}
  .chip.k{background:var(--s2);color:var(--text);border-color:var(--b2);}
  .htcat{margin-bottom:12px;}
  .htcat .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
  .hooks li,.tips li{background:var(--s2);border:1px solid var(--b2);border-radius:9px;padding:10px 12px;margin-bottom:7px;list-style:none;font-size:14px;line-height:1.5;}
  .step{border-left:3px solid var(--orange);padding:6px 0 6px 12px;margin-bottom:10px;}
  .step .p{font-size:12px;color:var(--orange);font-weight:800;text-transform:uppercase;}
  .step .c{font-size:14px;line-height:1.5;margin-top:2px;}
  .muted{color:var(--muted);}
  .empty,.err{text-align:center;padding:36px 16px;color:var(--muted);}
  .err{color:#ffb1b1;}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#1a1200;border-radius:50%;animation:s .7s linear infinite;vertical-align:-3px;}
  @keyframes s{to{transform:rotate(360deg)}}
  .hd{display:flex;justify-content:space-between;align-items:center;}
</style>
</head>
<body>
<div class="top">
  <div class="logo"><span class="dot">✦</span> VidSpark AI</div>
  <a href="/dashboard.html">← Dashboard</a>
</div>

<div class="wrap">
  <h1>🎵 SEO TikTok</h1>
  <div class="sub">Génère la légende, les hooks, les hashtags et un script optimisés pour percer sur TikTok — propulsé par IA.</div>

  <div class="card">
    <label for="topic">Sujet de ta vidéo *</label>
    <input id="topic" placeholder="Ex : 3 astuces pour monter vite sur YouTube" maxlength="200">
    <div class="row">
      <div>
        <label for="niche">Niche / style (optionnel)</label>
        <input id="niche" placeholder="Ex : tech, humour, fitness…" maxlength="80">
      </div>
      <div>
        <label for="lang">Langue</label>
        <select id="lang">
          <option value="fr">Français</option>
          <option value="en">English</option>
          <option value="es">Español</option>
          <option value="ar">العربية</option>
          <option value="pt">Português</option>
          <option value="de">Deutsch</option>
        </select>
      </div>
    </div>
    <label for="desc">Contexte / description (optionnel)</label>
    <textarea id="desc" placeholder="Décris brièvement le contenu de la vidéo…" maxlength="400"></textarea>
    <button class="btn" id="go" onclick="generate()">✨ Générer le SEO TikTok</button>
  </div>

  <div id="out"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/auth.js"></script>
<script>
const API_BASE = 'https://vidspark-ai-production-9ac7.up.railway.app';

/* Exige une connexion : sans session, on renvoie vers le login */
(async function(){
  try{
    const s = await (window.Auth?.getSession?.() || Promise.resolve(null));
    if(!s?.access_token){
      document.getElementById('out').innerHTML =
        '<div class="empty">🔒 Connecte-toi pour utiliser le SEO TikTok.<br><br><a href="/login.html">Se connecter →</a></div>';
      document.getElementById('go').disabled = true;
    }
  }catch(e){}
})();

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function copy(txt,btn){navigator.clipboard.writeText(txt).then(()=>{const t=btn.textContent;btn.textContent='✓ Copié';setTimeout(()=>btn.textContent=t,1400);});}

async function generate(){
  const topic = document.getElementById('topic').value.trim();
  const niche = document.getElementById('niche').value.trim();
  const description = document.getElementById('desc').value.trim();
  const language = document.getElementById('lang').value;
  const out = document.getElementById('out');
  const btn = document.getElementById('go');

  if(topic.length < 2){ out.innerHTML='<div class="err">Entre un sujet de vidéo.</div>'; return; }

  btn.disabled = true; btn.innerHTML='<span class="spin"></span> Génération…';
  out.innerHTML='<div class="empty">🎬 L’IA optimise ta vidéo TikTok…</div>';

  try{
    const s = await Auth.getSession();
    const token = s?.access_token;
    if(!token){ out.innerHTML='<div class="err">Session expirée — <a href="/login.html">reconnecte-toi</a>.</div>'; return; }

    const res = await fetch(`${API_BASE}/api/ai/tiktok-seo`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
      body:JSON.stringify({ topic, niche, description, language })
    });
    if(!res.ok){
      const e = await res.json().catch(()=>({}));
      throw new Error(e.error || ('Erreur '+res.status));
    }
    render(await res.json());
    if(typeof fbq==='function') fbq('trackCustom','TikTokSEOGenerated');
  }catch(err){
    out.innerHTML = '<div class="err">❌ '+esc(err.message)+'</div>';
  }finally{
    btn.disabled=false; btn.innerHTML='✨ Générer le SEO TikTok';
  }
}

function chips(arr, cls){ return '<div class="chips">'+(arr||[]).map(h=>`<span class="chip ${cls||''}">${esc(h)}</span>`).join('')+'</div>'; }

function render(d){
  const ht = d.hashtags || {};
  const allTags = [].concat(ht.broad||[], ht.niche||[], ht.trending||[]).join(' ');
  const html = `
    <div class="card">
      <div class="sec">
        <div class="hd"><h3>📝 Légende optimisée</h3><button class="btn-mini" onclick='copy(${JSON.stringify(d.caption||"")},this)'>📋 Copier</button></div>
        <div class="cap">${esc(d.caption)}</div>
      </div>

      <div class="sec">
        <h3>🪝 Hooks (3 premières secondes)</h3>
        <ul class="hooks">${(d.hooks||[]).map(h=>`<li>${esc(h)}</li>`).join('')}</ul>
      </div>

      <div class="sec">
        <div class="hd"><h3># Hashtags</h3><button class="btn-mini" onclick='copy(${JSON.stringify(allTags)},this)'>📋 Tout copier</button></div>
        <div class="htcat"><div class="lbl">Larges</div>${chips(ht.broad)}</div>
        <div class="htcat"><div class="lbl">Niche</div>${chips(ht.niche)}</div>
        <div class="htcat"><div class="lbl">Tendance</div>${chips(ht.trending)}</div>
      </div>

      <div class="sec">
        <h3>🔎 Mots-clés de recherche</h3>
        ${chips(d.keywords,'k')}
      </div>

      <div class="sec">
        <h3>🎬 Structure / script</h3>
        ${(d.script||[]).map(s=>`<div class="step"><div class="p">${esc(s.part)}</div><div class="c">${esc(s.content)}</div></div>`).join('')}
      </div>

      ${d.sound_advice?`<div class="sec"><h3>🎧 Conseil son / musique</h3><div class="cap">${esc(d.sound_advice)}</div></div>`:''}

      <div class="sec">
        <h3>🚀 Conseils de publication</h3>
        <ul class="tips">${(d.posting_tips||[]).map(t=>`<li>${esc(t)}</li>`).join('')}</ul>
      </div>

      <div class="sec">
        <h3>📈 Découvrabilité</h3>
        <ul class="tips">${(d.discoverability_tips||[]).map(t=>`<li>${esc(t)}</li>`).join('')}</ul>
      </div>
    </div>`;
  document.getElementById('out').innerHTML = html;
}
</script>
</body>
</html>
