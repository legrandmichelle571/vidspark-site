<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VidSpark AI Pricing — Choose the perfect plan">
  <title>Pricing — VidSpark AI</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --bg:       var(--vs-bg);
      --s1:       var(--vs-surface-3);
      --s2:       var(--vs-surface);
      --s3:       var(--vs-surface-2);
      --b1:       var(--vs-border-1);
      --b2:       var(--vs-border-2);
      --b3:       var(--vs-border-3);
      --text:     var(--vs-text);
      --muted:    var(--vs-muted);
      --faint:    var(--vs-faint);
      --purple:   var(--vs-accent);
      --blue:     #2563EB;
      --green:    var(--vs-green);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* Header */
    .pricing-header {
      text-align: center;
      padding: 80px 24px 40px;
    }

    .pricing-header h1 {
      font-size: 40px;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #F2900F 0%, #2563EB 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .pricing-header p {
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 40px;
    }

    /* Plans Grid */
    .plans-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 80px;
    }

    .plan-card {
      background: var(--s3);
      border: 2px solid var(--b2);
      border-radius: 16px;
      padding: 40px 28px;
      position: relative;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .plan-card:hover {
      border-color: var(--purple);
      transform: translateY(-8px);
    }

    .plan-card.recommended {
      border-color: var(--purple);
      background: linear-gradient(135deg, var(--vs-accent-soft, #FDECD1) 0%, var(--s3) 100%);
      transform: scale(1.05);
    }

    .plan-badge {
      position: absolute;
      top: -12px;
      left: 24px;
      background: var(--purple);
      color: #0b0f19;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .plan-name {
      font-size: 24px;
      font-weight: 700;
      margin-top: 16px;
      margin-bottom: 8px;
    }

    .plan-description {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .plan-price {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 4px;
      color: var(--purple);
    }

    .plan-price-period {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--b2);
    }

    .plan-features {
      list-style: none;
      margin-bottom: 32px;
      flex-grow: 1;
    }

    .plan-features li {
      padding: 12px 0;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
    }

    .plan-features li.disabled {
      color: var(--muted);
      opacity: 0.6;
    }

    .feature-icon {
      font-size: 18px;
      min-width: 20px;
    }

    .plan-cta {
      background: var(--purple);
      color: #0b0f19;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
    }

    .plan-cta:hover {
      background: var(--purple);
      opacity: 0.9;
      transform: scale(1.02);
    }

    .plan-cta:disabled {
      background: var(--muted);
      cursor: not-allowed;
      opacity: 0.5;
    }

    /* Comparison Table */
    .comparison-section {
      margin-top: 80px;
      padding: 40px 24px;
      background: var(--s2);
      border-radius: 16px;
      border: 2px solid var(--b2);
    }

    .comparison-section h2 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 40px;
      text-align: center;
    }

    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .comparison-table th,
    .comparison-table td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid var(--b2);
    }

    .comparison-table th {
      background: var(--s3);
      font-weight: 600;
      color: var(--purple);
    }

    .comparison-table td {
      color: var(--text);
    }

    .comparison-table tr:hover td {
      background: rgba(242, 144, 15, 0.05);
    }

    .check { color: var(--green); font-weight: bold; }
    .cross { color: var(--muted); opacity: 0.5; }

    /* Billing Interval Toggle */
    .billing-toggle-section {
      text-align: center;
      margin-bottom: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .billing-toggle-buttons {
      display: flex;
      gap: 12px;
      background: var(--b2);
      padding: 8px;
      border-radius: 10px;
    }

    .billing-toggle-btn {
      padding: 12px 24px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .billing-toggle-btn.active {
      background: var(--purple);
      color: #0b0f19;
    }

    .billing-toggle-btn:hover:not(.active) {
      color: var(--text);
    }

    .savings-badge {
      background: var(--green);
      color: #fff;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: none;
    }

    .savings-badge.show {
      display: inline-block;
    }

    /* FAQ Section */
    .faq-section {
      margin-top: 80px;
      padding: 40px 0;
    }

    .faq-section h2 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 40px;
      text-align: center;
    }

    .faq-list {
      max-width: 700px;
      margin: 0 auto;
    }

    .faq-item {
      background: var(--s3);
      border: 2px solid var(--b2);
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .faq-question {
      padding: 20px;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
    }

    .faq-question:hover {
      background: rgba(242, 144, 15, 0.08);
    }

    .faq-question.active {
      background: var(--purple);
      color: #0b0f19;
    }

    .faq-toggle { font-size: 20px; }

    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      background: rgba(0, 0, 0, 0.03);
      color: var(--muted);
    }

    .faq-item.active .faq-answer {
      max-height: 200px;
      padding: 20px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .pricing-header h1 {
        font-size: 32px;
      }

      .plan-card.recommended {
        transform: scale(1);
      }

      .plans-grid {
        grid-template-columns: 1fr;
      }

      .comparison-table th,
      .comparison-table td {
        padding: 12px;
        font-size: 13px;
      }
    }
  </style>

      pr_feat_api:{fr:'Accès API',en:'API access',ar:'وصول API'},
      pr_feat_prio:{fr:'Support prioritaire',en:'Priority support',ar:'دعم ذو أولوية'},
      pr_feat_all_biz:{fr:'Tout le plan Business',en:'Everything in Business',ar:'كل ما في خطة بيزنس'},
      pr_feat_10_chan:{fr:'10 chaînes max',en:'Max 10 channels',ar:'10 قنوات بحد أقصى'},
      pr_feat_adv_audit:{fr:'💎 Audit de chaîne avancé',en:'💎 Advanced channel audit',ar:'💎 تدقيق متقدم للقناة'},
      pr_feat_rank:{fr:'💎 Suivi de position',en:'💎 Rank tracker',ar:'💎 متتبّع الترتيب'},
      /* ── DIVERS ── */
      pr_err:{fr:'Erreur',en:'Error',ar:'خطأ'},
    });
  </script>

  <script src="js/plans-config.js"></script>
  <script src="js/api.js"></script>
  <script>
    const FEATURE_I18N = {
      'Analyze videos':'pr_feat_analyze','SEO score':'pr_feat_seo_score',
      'AI reports':'pr_feat_ai_reports','AI titles':'pr_feat_ai_titles',
      'PDF export':'pr_feat_pdf','Max 1 channel':'pr_feat_1_chan',
      'AI reports (100/mo)':'pr_feat_reports_100','AI titles (unlimited)':'pr_feat_titles_unlim',
      'AI reports (5k/mo)':'pr_feat_reports_5k','Multi-channel (up to 5)':'pr_feat_multichan_5',
      'API access':'pr_feat_api','Priority support':'pr_feat_prio',
      'Everything in Business':'pr_feat_all_biz','Max 10 channels':'pr_feat_10_chan',
      '💎 Advanced channel audit':'pr_feat_adv_audit','💎 Rank tracker':'pr_feat_rank',
    };
    let currentBillingInterval = 'month';

    function getFAQData(){
      return [
        { question: t('pr_fq1'), answer: t('pr_fa1') },
        { question: t('pr_fq2'), answer: t('pr_fa2') },
        { question: t('pr_fq3'), answer: t('pr_fa3') },
        { question: t('pr_fq4'), answer: t('pr_fa4') },
        { question: t('pr_fq5'), answer: t('pr_fa5') },
        { question: t('pr_fq6'), answer: t('pr_fa6') }
      ];
    }

    // Render comparison table
    function renderComparisonTable() {
      const proPriceDisplay = currentBillingInterval === 'year' ? '$107.89/year' : '$9.99/mo';
      const businessPriceDisplay = currentBillingInterval === 'year' ? '$323.89/year' : '$29.99/mo';
      const diamantPriceDisplay = currentBillingInterval === 'year' ? '$539.89/year' : '$49.99/mo';

      const tableHtml = `
        <table class="comparison-table">
          <thead>
            <tr>
              <th>${t('pr_feature')}</th>
              <th>FREE</th>
              <th>PRO</th>
              <th>BUSINESS</th>
              <th>💎 DIAMANT</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>${t('pr_price')}</td>
              <td>$0</td>
              <td>${proPriceDisplay}</td>
              <td>${businessPriceDisplay}</td>
              <td>${diamantPriceDisplay}</td>
            </tr>
            <tr>
              <td>${t('pr_analyses')}</td>
              <td class="check">10</td>
              <td class="check">500</td>
              <td class="check">10,000</td>
              <td class="check">150,000</td>
            </tr>
            <tr>
              <td>${t('pr_reports')}</td>
              <td class="cross">—</td>
              <td class="check">100</td>
              <td class="check">5,000</td>
              <td class="check">60,000</td>
            </tr>
            <tr>
              <td>${t('pr_titles')}</td>
              <td class="cross">—</td>
              <td class="check">${t('pr_unlim')}</td>
              <td class="check">${t('pr_unlim')}</td>
              <td class="check">2,500</td>
            </tr>
            <tr>
              <td>${t('pr_channels')}</td>
              <td class="check">1</td>
              <td class="check">1</td>
              <td class="check">5</td>
              <td class="check">10</td>
            </tr>
            <tr>
              <td>${t('pr_pdf')}</td>
              <td class="cross">—</td>
              <td class="check">✓</td>
              <td class="check">✓</td>
              <td class="check">✓</td>
            </tr>
            <tr>
              <td>${t('pr_api')}</td>
              <td class="cross">—</td>
              <td class="cross">—</td>
              <td class="check">✓</td>
              <td class="check">✓</td>
            </tr>
            <tr>
              <td>${t('pr_prio')}</td>
              <td class="cross">—</td>
              <td class="cross">—</td>
              <td class="check">✓</td>
              <td class="check">✓</td>
            </tr>
            <tr>
              <td>${t('pr_audit')}</td>
              <td class="cross">—</td>
              <td class="cross">—</td>
              <td class="cross">—</td>
              <td class="check">✓</td>
            </tr>
            <tr>
              <td>${t('pr_rank')}</td>
              <td class="cross">—</td>
              <td class="cross">—</td>
              <td class="cross">—</td>
              <td class="check">✓</td>
            </tr>
            <tr>
              <td>${t('pr_sameacc')}</td>
              <td class="cross">N/A</td>
              <td class="cross">N/A</td>
              <td class="check">${t('pr_required')}</td>
              <td class="check">${t('pr_required')}</td>
            </tr>
          </tbody>
        </table>
      `;

      document.getElementById('comparisonTableContainer').innerHTML = tableHtml;
    }

    // Setup billing interval toggle
    function setupBillingToggle() {
      const toggleButtons = document.querySelectorAll('.billing-toggle-btn');
      const savingsBadge = document.getElementById('savingsBadge');

      toggleButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          // Remove active from all buttons
          toggleButtons.forEach(b => b.classList.remove('active'));
          // Add active to clicked button
          btn.classList.add('active');

          // Update current interval
          currentBillingInterval = btn.getAttribute('data-interval');

          // Show/hide savings badge
          if (currentBillingInterval === 'year') {
            savingsBadge.classList.add('show');
          } else {
            savingsBadge.classList.remove('show');
          }

          // Re-render plans and comparison table with new interval
          renderPlans();
          renderComparisonTable();
        });
      });
    }

    // Render plans
    function renderPlans() {
      const plansHtml = Object.keys(PLANS_CONFIG).map(planId => {
        const plan = PLANS_CONFIG[planId];
        const isRecommended = plan.recommended;
        const price = currentBillingInterval === 'year' ? plan.price_yearly : plan.price_monthly;
        const isFree = planId === 'free';

        return `
          <div class="plan-card ${isRecommended ? 'recommended' : ''}">
            ${isRecommended ? `<div class="plan-badge">${t('pr_recommended')}</div>` : ''}
            <div class="plan-name">${t('pr_plan_name_' + planId) || plan.name}</div>
            <div class="plan-description">${t('pr_plan_desc_' + planId) || plan.description}</div>
            <div class="plan-price">${isFree ? '$0' : '$' + price.toFixed(2)}</div>
            <div class="plan-price-period">${isFree ? t('pr_foreverfree') : '/' + (currentBillingInterval === 'year' ? t('pr_year') : t('pr_month'))}</div>
            <ul class="plan-features">
              ${plan.features.map(feature => `
                <li class="${feature.included ? '' : 'disabled'}">
                  <span class="feature-icon">${feature.included ? '✓' : '✗'}</span>
                  ${FEATURE_I18N[feature.name] ? t(FEATURE_I18N[feature.name]) : feature.name}
                </li>
              `).join('')}
            </ul>
            <button class="plan-cta" onclick="handlePlanClick('${planId}')">
              ${planId === 'free' ? t('pr_getstarted') : t('pr_choose')}
            </button>
          </div>
        `;
      }).join('');

      document.getElementById('plansContainer').innerHTML = plansHtml;
    }

    // Render FAQ
    function renderFAQ() {
      const faqHtml = getFAQData().map((item, idx) => `
        <div class="faq-item">
          <div class="faq-question" onclick="toggleFAQ(${idx})">
            <span>${item.question}</span>
            <span class="faq-toggle">+</span>
          </div>
          <div class="faq-answer">${item.answer}</div>
        </div>
      `).join('');

      document.getElementById('faqContainer').innerHTML = faqHtml;
    }

    function toggleFAQ(idx) {
      const items = document.querySelectorAll('.faq-item');
      items[idx].classList.toggle('active');

      // Toggle icon
      const toggle = items[idx].querySelector('.faq-toggle');
      toggle.textContent = items[idx].classList.contains('active') ? '−' : '+';
    }

    function handlePlanClick(planId) {
      // Plan gratuit → inscription directe (aucune carte requise)
      if (planId === 'free') {
        window.location.href = '/login.html';
        return;
      }

      // Vérifier la connexion ; sinon mémoriser l'intention et rediriger vers login
      const user = JSON.parse(localStorage.getItem('VIDSPARK_USER') || '{}');
      if (!user.id) {
        try {
          localStorage.setItem('VIDSPARK_PENDING_PLAN', JSON.stringify({
            plan: planId, interval: currentBillingInterval
          }));
        } catch (e) {}
        window.location.href = '/login.html?next=pricing';
        return;
      }

      // Lancer le checkout avec l'intervalle choisi
      BillingAPI.checkout(planId, currentBillingInterval).catch(err => {
        alert(t('pr_err') + ' : ' + err.message);
      });
    }

    // Reprendre un checkout en attente après connexion (?next=pricing)
    function resumePendingCheckout() {
      const user = JSON.parse(localStorage.getItem('VIDSPARK_USER') || '{}');
      if (!user.id) return;
      let pending = null;
      try { pending = JSON.parse(localStorage.getItem('VIDSPARK_PENDING_PLAN') || 'null'); } catch (e) {}
      if (pending && pending.plan) {
        localStorage.removeItem('VIDSPARK_PENDING_PLAN');
        BillingAPI.checkout(pending.plan, pending.interval || 'month').catch(err => {
          alert(t('pr_err') + ' : ' + err.message);
        });
      }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      setupBillingToggle();
      renderPlans();
      renderComparisonTable();
      renderFAQ();
      resumePendingCheckout();
    });
    // Re-render le contenu généré en JS quand la langue change
    document.addEventListener('vslangchange', () => {
      renderPlans();
      renderComparisonTable();
      renderFAQ();
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/dashboard-link.js"></script>
</body>
</html>
