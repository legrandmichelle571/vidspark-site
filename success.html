<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VidSpark AI — Paiement</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fnhyskbisfbtjgblbiap.supabase.co" crossorigin>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
    body{background:#07070a;color:#e8e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{background:#0e0e12;border:1px solid #1b2330;border-radius:16px;padding:40px 32px;max-width:440px;width:100%;text-align:center;}
    .icon{font-size:56px;margin-bottom:16px;}
    h1{font-size:22px;font-weight:800;margin-bottom:10px;}
    p{color:#8888a0;font-size:14px;line-height:1.6;margin-bottom:24px;}
    .btn{display:inline-block;background:linear-gradient(135deg,#f7941d,#f9a94a);color:#fff;border:none;border-radius:10px;padding:13px 24px;font-weight:700;font-size:14px;text-decoration:none;cursor:pointer;}
    .spin{display:inline-block;width:38px;height:38px;border:4px solid rgba(247,148,29,.25);border-top-color:#f7941d;border-radius:50%;animation:s .7s linear infinite;}
    @keyframes s{to{transform:rotate(360deg)}}
    .plan{display:inline-block;background:rgba(247,148,29,.15);border:1px solid rgba(247,148,29,.4);color:#f5801f;font-weight:800;padding:4px 12px;border-radius:20px;font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;}
  </style>
<style id="orange-frames">
/* Encadrement orange sur tous les panneaux/cartes */
.card,.kpi,.section,.panel,.box,.contact-card,.pricing-card,.price-card,.plan-card,.tier-card,.tier,.feature,.feature-card,.faq-item,.faq,.tool-card,.stat-card,.stat,.glass,.info-card,.info-item,.step,.opp-card{border:1.5px solid #f7941d !important;}
/* Les tuiles d'outils restent pleines (sans bordure) */
.tool-tile{border:none !important;}
</style>
  <script src="/js/i18n.js"></script>
  <script src="/js/meta-pixel.js"></script>
  <script>
  registerI18n({
    sc_loading_h:{fr:'Validation du paiement…',en:'Validating payment…',ar:'جارٍ التحقق من الدفع…'},
    sc_loading_p:{fr:'Un instant, on active ton abonnement.',en:'Just a moment, we are activating your subscription.',ar:'لحظة، جارٍ تفعيل اشتراكك.'},
    sc_ok_h:{fr:'Paiement réussi !',en:'Payment successful!',ar:'تم الدفع بنجاح!'},
    sc_ok_p:{fr:'Ton abonnement est maintenant actif. Profite de tes nouveaux outils.',en:'Your subscription is now active. Enjoy your new tools.',ar:'اشتراكك نشط الآن. استمتع بأدواتك الجديدة.'},
    sc_received_h:{fr:'Paiement reçu !',en:'Payment received!',ar:'تم استلام الدفعة!'},
    sc_received_p:{fr:'Ton abonnement est en cours d\'activation.',en:'Your subscription is being activated.',ar:'جارٍ تفعيل اشتراكك.'},
    sc_fail_h:{fr:'Souci avec le paiement',en:'Payment issue',ar:'مشكلة في الدفع'},
    sc_fail_p_def:{fr:'Le paiement n\'a pas pu être validé.',en:'The payment could not be validated.',ar:'تعذّر التحقق من الدفعة.'},
    sc_fail_contact:{fr:'Si tu as été débité, contacte le support.',en:'If you were charged, please contact support.',ar:'إذا تم خصم مبلغ منك، يرجى التواصل مع الدعم.'},
    sc_dashboard:{fr:'Aller au tableau de bord →',en:'Go to dashboard →',ar:'الانتقال إلى لوحة التحكم ←'},
    sc_back_plans:{fr:'Retour aux forfaits',en:'Back to plans',ar:'العودة إلى الباقات'},
    sc_err_no_ref:{fr:'Référence de commande manquante.',en:'Missing order reference.',ar:'مرجع الطلب مفقود.'},
    sc_err_not_auth:{fr:'Tu dois être connecté pour valider le paiement.',en:'You must be logged in to validate the payment.',ar:'يجب تسجيل الدخول للتحقق من الدفع.'},
  });
  </script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0B0F19">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VidSpark AI">
  <link rel="stylesheet" href="/css/responsive.css">
  <script defer src="/js/pwa.js"></script>
</head>
<body>
  <div class="card" id="card">
    <div class="spin"></div>
    <h1 style="margin-top:20px;" data-i18n="sc_loading_h">Validation du paiement…</h1>
    <p data-i18n="sc_loading_p">Un instant, on active ton abonnement.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script>
    const API = 'https://vidspark-ai-production-9ac7.up.railway.app';
    const card = document.getElementById('card');

    const PLAN_PRICES = { pro: 9.99, business: 29.99, diamant: 49.99 };
    function trackPurchase(plan){
      if (typeof fbq !== 'function') return;
      fbq('track', 'Purchase', {
        currency: 'USD',
        value: PLAN_PRICES[(plan || '').toLowerCase()] || 0,
        content_name: plan || 'subscription'
      });
    }

    function ok(plan){
      trackPurchase(plan);
      card.innerHTML = `
        <div class="icon">✅</div>
        <div class="plan">💎 ${plan}</div>
        <h1>${t('sc_ok_h')}</h1>
        <p><b>${plan.toUpperCase()}</b> — ${t('sc_ok_p')}</p>
        <a class="btn" href="/dashboard.html">${t('sc_dashboard')}</a>`;
    }
    function fail(msg){
      card.innerHTML = `
        <div class="icon">⚠️</div>
        <h1>${t('sc_fail_h')}</h1>
        <p>${msg || t('sc_fail_p_def')}<br>${t('sc_fail_contact')}</p>
        <a class="btn" href="/pricing.html">${t('sc_back_plans')}</a>`;
    }

    window.addEventListener('load', async () => {
      const params = new URLSearchParams(location.search);
      const type   = params.get('type');
      const token  = params.get('token');   // PayPal renvoie l'ID de commande dans "token"

      // Stripe : le webhook active déjà le plan → simple confirmation
      if (type !== 'paypal'){
        if (typeof fbq === 'function') fbq('track', 'Purchase', { currency: 'USD', value: 0 });
        card.innerHTML = `<div class="icon">✅</div><h1>${t('sc_received_h')}</h1>
          <p>${t('sc_received_p')}</p>
          <a class="btn" href="/dashboard.html">${t('sc_dashboard')}</a>`;
        return;
      }

      if (!token){ fail(t('sc_err_no_ref')); return; }

      try {
        const session = await Auth.getSession();
        if (!session?.access_token){
          fail(t('sc_err_not_auth'));
          return;
        }
        const r = await fetch(API + '/api/subscription/paypal/capture', {
          method:'POST',
          headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${session.access_token}` },
          body: JSON.stringify({ orderId: token })
        });
        const data = await r.json().catch(()=>({}));
        if (r.ok && data.success){ ok(data.plan); }
        else { fail(data.error); }
      } catch(e){ fail(e.message); }
    });
  </script>
</body>
</html>
