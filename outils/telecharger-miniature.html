  tm_badge:{fr:'100% GRATUIT · HD · SANS INSCRIPTION',en:'100% FREE · HD · NO SIGN-UP',es:'100% GRATIS · HD · SIN REGISTRO',ar:'مجاني 100% · HD · بدون تسجيل'},

  tm_faq_title:{fr:'Questions fréquentes',en:'FAQ',es:'Preguntas frecuentes',ar:'أسئلة شائعة'},
  tm_q1:{fr:'Quelles tailles sont disponibles ?',en:'Which sizes are available?',es:'¿Qué tamaños están disponibles?',ar:'ما الأحجام المتاحة؟'},
  tm_a1:{fr:'HD 1280×720 (maxres), SD 640×480, HQ 480×360 et MQ 320×180 — selon ce que la vidéo propose. Si la HD n’apparaît pas, la vidéo n’a pas de miniature maxres.',en:'HD 1280×720 (maxres), SD 640×480, HQ 480×360 and MQ 320×180 — depending on what the video offers. If HD is missing, the video has no maxres thumbnail.',es:'HD 1280×720 (maxres), SD 640×480, HQ 480×360 y MQ 320×180 — según lo que ofrezca el vídeo. Si no aparece HD, el vídeo no tiene miniatura maxres.',ar:'HD 1280×720 (maxres)، SD 640×480، HQ 480×360 و MQ 320×180 — حسب ما يوفّره الفيديو. إن لم تظهر HD فالفيديو ليس لديه صورة maxres.'},
  tm_q2:{fr:'Ça marche avec les Shorts ?',en:'Does it work with Shorts?',es:'¿Funciona con los Shorts?',ar:'هل يعمل مع Shorts؟'},
  tm_a2:{fr:'Oui, colle l’URL du Short (youtube.com/shorts/…) et l’outil récupère sa miniature.',en:'Yes, paste the Short URL (youtube.com/shorts/…) and the tool grabs its thumbnail.',es:'Sí, pega la URL del Short (youtube.com/shorts/…) y la herramienta obtiene su miniatura.',ar:'نعم، الصق رابط Short (youtube.com/shorts/…) وستحصل الأداة على صورته المصغّرة.'},
  tm_q3:{fr:'Puis-je utiliser la miniature d’un autre créateur ?',en:'Can I use another creator’s thumbnail?',es:'¿Puedo usar la miniatura de otro creador?',ar:'هل يمكنني استخدام صورة منشئ آخر؟'},
  tm_a3:{fr:'Pour t’en inspirer oui, mais la réutiliser telle quelle peut violer ses droits d’auteur. Utilise cet outil pour analyser, étudier ou sauvegarder tes propres miniatures.',en:'For inspiration yes, but reusing it as-is may infringe copyright. Use this tool to analyze, study or save your own thumbnails.',es:'Para inspirarte sí, pero reutilizarla tal cual puede violar sus derechos de autor. Usa esta herramienta para analizar, estudiar o guardar tus propias miniaturas.',ar:'للاستلهام نعم، لكن إعادة استخدامها كما هي قد تنتهك حقوق النشر. استخدم الأداة للتحليل أو الدراسة أو حفظ صورك الخاصة.'},

  tm_up_btn:{fr:'Découvrir VidSpark AI — dès 9,99€/mois',en:'Discover VidSpark AI — from €9.99/mo',es:'Descubre VidSpark AI — desde 9,99€/mes',ar:'اكتشف VidSpark AI — من 9.99€ شهريًا'},
  tm_invalid:{fr:'❌ URL YouTube invalide.',en:'❌ Invalid YouTube URL.',es:'❌ URL de YouTube no válida.',ar:'❌ رابط يوتيوب غير صالح.'},
  tm_dl:{fr:'⬇ Télécharger',en:'⬇ Download',es:'⬇ Descargar',ar:'⬇ تنزيل'}

function go(){
  const id=vidId(document.getElementById('url').value);
  const r=document.getElementById('res');
  if(!id){r.innerHTML='<div class="err">'+t('tm_invalid')+'</div>';return;}
  const sizes=[['maxresdefault','HD 1280×720'],['sddefault','SD 640×480'],['hqdefault','HQ 480×360'],['mqdefault','MQ 320×180']];
  r.innerHTML=`
    <div class="vs-premium vs-glass vs-reveal">
      <div class="vs-premium-section-head" style="margin-bottom:10px;">🖼️ Miniatures disponibles</div>
      <div class="thumbs">${sizes.map(([q,lbl])=>`
        <div class="thumb-card">
          <img src="https://i.ytimg.com/vi/${id}/${q}.jpg" onerror="this.parentNode.style.display='none'">
          <div class="meta"><span>${lbl}</span><a href="https://i.ytimg.com/vi/${id}/${q}.jpg" target="_blank" download>${t('tm_dl')}</a></div>
        </div>`).join('')}</div>
    </div>`;
}
