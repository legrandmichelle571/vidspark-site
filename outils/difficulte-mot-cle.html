function tierFromScore(s){
  if(s<35) return {k:'kd_t_easy',a:'kd_a_easy',c:'#22c55e'};
  if(s<55) return {k:'kd_t_med', a:'kd_a_med', c:'#f5b301'};
  if(s<75) return {k:'kd_t_hard',a:'kd_a_hard',c:'#f7941d'};
  return       {k:'kd_t_vhard',a:'kd_a_vhard',c:'#ef4444'};
}
function compLabel(comp){ return comp==='forte'?t('kd_c_high'):comp==='moyenne'?t('kd_c_med'):t('kd_c_low'); }
function compColor(comp){ return comp==='forte'?'#ef4444':comp==='moyenne'?'#f5b301':'#22c55e'; }

async function go(){
  const q=document.getElementById('kw').value.trim();
  const r=document.getElementById('res');
  if(q.length<2){r.innerHTML='<div class="err">'+t('kd_min')+'</div>';return;}
  r.innerHTML=spinner(t('kd_spin'));
  try{
    const resp=await fetch(API+'/api/public/ai/keyword-difficulty',{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})
    });
    const d=await resp.json().catch(()=>({}));
    if(!resp.ok) throw new Error(d.error||'Service indisponible');

    const score=(d.difficulty&&d.difficulty.score!==undefined)?d.difficulty.score:undefined;
    const tier=score!==undefined?tierFromScore(score):null;
    const cCol=compColor(d.competition);
    const chips=(d.suggestions||[]).map(s=>`<span style="display:inline-block;background:#1b2330;border:1px solid #2b3647;border-radius:16px;padding:6px 12px;margin:4px;font-size:13px;cursor:pointer" onclick="document.getElementById('kw').value=this.textContent;go()">${esc(s)}</span>`).join('');

    r.innerHTML=`
      ${tier?`<div style="text-align:center;padding:18px;background:#1b2330;border-radius:12px;border:2px solid ${tier.c};margin-bottom:14px">
        <div style="font-size:11px;color:#8888a0;margin-bottom:4px">${t('kd_diff')}</div>
        <div style="font-size:46px;font-weight:900;color:${tier.c};line-height:1">${score}<span style="font-size:20px">/100</span></div>
        <div style="font-size:18px;font-weight:800;color:${tier.c};margin-top:4px">${t(tier.k)}</div>
        <div style="color:#8888a0;font-size:13px;margin-top:8px">${t(tier.a)}</div>
        <div style="height:8px;background:#2b3647;border-radius:4px;overflow:hidden;margin-top:12px"><div style="height:100%;width:${score}%;background:${tier.c};border-radius:4px"></div></div>
      </div>`:''}
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px">
        <div style="flex:1;text-align:center;padding:14px;background:#1b2330;border-radius:10px;min-width:120px">
          <div style="font-size:22px;font-weight:800;color:${cCol}">${esc(compLabel(d.competition))}</div>
          <div style="font-size:11px;color:#8888a0">${t('kd_comp')}</div>
        </div>
        <div style="flex:1;text-align:center;padding:14px;background:#1b2330;border-radius:10px;min-width:120px">
          <div style="font-size:22px;font-weight:800">${(d.top_avg_views||0).toLocaleString()}</div>
          <div style="font-size:11px;color:#8888a0">${t('kd_avg')}</div>
        </div>
        <div style="flex:1;text-align:center;padding:14px;background:#1b2330;border-radius:10px;min-width:120px">
          <div style="font-size:22px;font-weight:800">${d.sampled||0}</div>
          <div style="font-size:11px;color:#8888a0">${t('kd_analyzed')}</div>
        </div>
      </div>
      ${chips?`<div style="font-size:12px;color:#f7941d;font-weight:700;margin-bottom:6px">${t('kd_sugg')}</div><div>${chips}</div>`:''}
    `;
  }catch(e){r.innerHTML='<div class="err">❌ '+esc(e.message)+'</div>';}
}
