<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to VidSpark AI — Select Your Channel</title>
  <style>
    :root {
      --bg:       #07070a;
      --s1:       #0e0e12;
      --s2:       #141418;
      --s3:       #1a1a20;
      --b1:       #1b2330;
      --b2:       #2b3647;
      --b3:       #3a3a48;
      --text:     #e8e8f0;
      --muted:    #8888a0;
      --faint:    #505060;
      --purple:   #f7941d;
      --purple-l: #f9a94a;
      --purple-d: #3a2406;
      --green:    #22c55e;
      --red:      #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.65;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    .container {
      width: 100%;
      max-width: 520px;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 16px;
      color: var(--muted);
    }

    .step-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--b2);
    }

    .step-dot.active {
      background: var(--purple);
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .channels-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .channel-card {
      padding: 16px;
      background: var(--b1);
      border: 2px solid var(--b2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .channel-card:hover {
      border-color: var(--b3);
      background: var(--b2);
    }

    .channel-card.selected {
      border-color: var(--purple);
      background: rgba(247,148,29,.1);
    }

    .channel-card-radio {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--b3);
      flex-shrink: 0;
    }

    .channel-card.selected .channel-card-radio {
      border-color: var(--purple);
      background: var(--purple);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    .channel-info {
      flex: 1;
    }

    .channel-name {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .channel-meta {
      font-size: 13px;
      color: var(--muted);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(247,148,29,.2);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: #ff6b6b;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: var(--purple);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--purple-l);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--b1);
      color: var(--text);
      border: 1px solid var(--b2);
    }

    .btn-secondary:hover {
      background: var(--b2);
    }

    .skip-link {
      text-align: center;
      margin-top: 16px;
    }

    .skip-link a {
      color: var(--muted);
      font-size: 13px;
      transition: color 0.2s;
    }

    .skip-link a:hover {
      color: var(--text);
    }
  </style>
<style id="orange-frames">
/* Encadrement orange sur tous les panneaux/cartes */
.card,.kpi,.section,.panel,.box,.contact-card,.pricing-card,.price-card,.plan-card,.tier-card,.tier,.feature,.feature-card,.faq-item,.faq,.tool-card,.stat-card,.stat,.glass,.info-card,.info-item,.step,.opp-card{border:1.5px solid #f7941d !important;}
/* Les tuiles d'outils restent pleines (sans bordure) */
.tool-tile{border:none !important;}
</style>
  <script src="/js/i18n.js"></script>
  <script>
  registerI18n({
    ob_title:{fr:'Bienvenue sur VidSpark AI',en:'Welcome to VidSpark AI',ar:'مرحبًا بك في VidSpark AI'},
    ob_sub:{fr:'Configurons ton compte',en:"Let's set up your account",ar:'لنقم بإعداد حسابك'},
    ob_step:{fr:'Étape 1 sur 2',en:'Step 1 of 2',ar:'الخطوة 1 من 2'},
    ob_loading:{fr:'Chargement de tes chaînes YouTube...',en:'Loading your YouTube channels...',ar:'جارٍ تحميل قنوات يوتيوب...'},
    ob_select_h:{fr:'Sélectionner ta chaîne principale',en:'Select Your Primary Channel',ar:'اختر قناتك الرئيسية'},
    ob_select_p:{fr:'Choisis la chaîne YouTube que tu veux analyser. Tu peux ajouter d\'autres chaînes plus tard.',en:'Choose the YouTube channel you want to analyze. You can add more channels later.',ar:'اختر قناة يوتيوب التي تريد تحليلها. يمكنك إضافة قنوات أخرى لاحقًا.'},
    ob_back:{fr:'Retour',en:'Back',ar:'رجوع'},
    ob_continue:{fr:'Continuer',en:'Continue',ar:'متابعة'},
    ob_skip:{fr:'Ignorer pour l\'instant',en:'Skip for now',ar:'تخطّي الآن'},
    ob_no_channels:{fr:'Aucune chaîne YouTube trouvée. Assure-toi que ton compte Google a des chaînes YouTube.',en:'No YouTube channels found. Make sure your Google account has YouTube channels.',ar:'لم يتم العثور على قنوات يوتيوب. تأكد من أن حساب Google لديك يحتوي على قنوات يوتيوب.'},
    ob_err_load:{fr:'Échec du chargement de tes chaînes YouTube. Réessaie.',en:'Failed to load your YouTube channels. Please try again.',ar:'فشل تحميل قنوات يوتيوب. يرجى المحاولة مجددًا.'},
    ob_err_save:{fr:'Échec de l\'enregistrement de ta chaîne. Réessaie.',en:'Failed to save your channel. Please try again.',ar:'فشل حفظ قناتك. يرجى المحاولة مجددًا.'},
    ob_subscribers:{fr:'abonnés',en:'subscribers',ar:'مشترك'},
    ob_yt_channel:{fr:'Chaîne YouTube',en:'YouTube channel',ar:'قناة يوتيوب'},
  });
  </script>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">✨</div>
      <h1 class="title" data-i18n="ob_title">Welcome to VidSpark AI</h1>
      <p class="subtitle" data-i18n="ob_sub">Let's set up your account</p>
      <div class="step-indicator">
        <div class="step-dot active"></div>
        <span data-i18n="ob_step">Step 1 of 2</span>
        <div class="step-dot"></div>
      </div>
    </div>

    <div class="content">
      <div id="error"></div>

      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p data-i18n="ob_loading">Loading your YouTube channels...</p>
      </div>

      <div id="channelsContent" style="display: none;">
        <h2 style="font-size: 16px; font-weight: 600; margin-bottom: 16px;" data-i18n="ob_select_h">Select Your Primary Channel</h2>
        <p style="font-size: 14px; color: var(--muted); margin-bottom: 20px;" data-i18n="ob_select_p">
          Choose the YouTube channel you want to analyze. You can add more channels later.
        </p>

        <div class="channels-grid" id="channelsList"></div>
      </div>

      <div class="actions">
        <button class="btn btn-secondary" onclick="goBack()" data-i18n="ob_back">Back</button>
        <button class="btn btn-primary" id="continueBtn" disabled onclick="continueSetup()" data-i18n="ob_continue">Continue</button>
      </div>

      <div class="skip-link">
        <a href="#" onclick="skipOnboarding(event)" data-i18n="ob_skip">Skip for now</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    /**
     * Onboarding — Sélection chaîne YouTube
     */
    let selectedChannel = null;

    async function loadChannels() {
      try {
        // Note: Cet endpoint devrait retourner les chaînes YouTube de l'utilisateur
        // via Google YouTube API
        const response = await API.get('/user/youtube-channels');
        const channels = response.channels || [];

        document.getElementById('loading').style.display = 'none';

        if (channels.length === 0) {
          document.getElementById('error').innerHTML =
            `<div class="error">${t('ob_no_channels')}</div>`;
          return;
        }

        renderChannels(channels);
        document.getElementById('channelsContent').style.display = 'block';
      } catch (err) {
        console.error('[Onboarding] Load channels error:', err);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').innerHTML =
          `<div class="error">${t('ob_err_load')}</div>`;
      }
    }

    function renderChannels(channels) {
      const list = document.getElementById('channelsList');
      list.innerHTML = channels.map(channel => `
        <div class="channel-card" onclick="selectChannel('${channel.id}', this)">
          <div class="channel-card-radio" data-channel-id="${channel.id}"></div>
          <div class="channel-info">
            <div class="channel-name">${channel.title}</div>
            <div class="channel-meta">
              ${channel.subscriberCount ? `${channel.subscriberCount} ${t('ob_subscribers')}` : t('ob_yt_channel')}
            </div>
          </div>
        </div>
      `).join('');
    }

    function selectChannel(channelId, element) {
      // Désélectionner le précédent
      document.querySelectorAll('.channel-card').forEach(el => {
        el.classList.remove('selected');
      });

      // Sélectionner le nouveau
      element.classList.add('selected');
      selectedChannel = {
        id: channelId,
        title: element.querySelector('.channel-name').textContent
      };

      document.getElementById('continueBtn').disabled = false;
    }

    async function continueSetup() {
      if (!selectedChannel) return;

      try {
        document.getElementById('continueBtn').disabled = true;

        // Sauvegarder la chaîne sélectionnée
        await ChannelsAPI.setPrimary(selectedChannel.id);

        // Rediriger vers dashboard
        window.location.href = '/dashboard.html';
      } catch (err) {
        console.error('[Onboarding] Setup error:', err);
        document.getElementById('error').innerHTML =
          `<div class="error">${t('ob_err_save')}</div>`;
        document.getElementById('continueBtn').disabled = false;
      }
    }

    function skipOnboarding(e) {
      e.preventDefault();
      window.location.href = '/dashboard.html';
    }

    function goBack() {
      window.history.back();
    }

    // Charger au démarrage
    Auth.requireLogin();
    window.addEventListener('load', loadChannels);
  </script>
</body>
</html>
