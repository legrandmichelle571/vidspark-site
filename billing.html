<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion Abonnement — VidSpark AI</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .page { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    .card { background: #1a1a2e; border: 1px solid #3a3a48; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .card h2 { margin-top: 0; color: #00d4ff; }
    .card-row { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; padding: 8px 0; border-bottom: 1px solid #3a3a48; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .badge-pro { background: rgba(124, 109, 250, 0.2); color: #7c6dfa; }
    .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .btn-primary { background: #00d4ff; color: #000; }
    .btn-danger { background: #ef4444; color: white; }
    .loading { color: #8888a0; }
  </style>
</head>
<body>
  <div class="page">
    <h1>💳 Gestion Abonnement</h1>
    <div class="card">
      <h2>📅 Abonnement Actuel</h2>
      <div id="subscriptionInfo" class="loading">Chargement...</div>
    </div>

    <div class="card">
      <h2>📈 Changer de Plan</h2>
      <div id="plansContainer"></div>
    </div>

    <div class="card">
      <h2>❌ Annuler</h2>
      <button class="btn btn-danger" onclick="cancelSubscription()">Annuler l'Abonnement</button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    async function loadSubscription() {
      const user = JSON.parse(localStorage.getItem('VIDSPARK_USER'));
      document.getElementById('subscriptionInfo').innerHTML = `
        <div>Plan: ${user.plan}</div>
        <div>Usage: ${user.monthly_usage || 0} / ${user.monthly_limit}</div>
      `;
    }
    async function cancelSubscription() {
      if (!confirm('Êtes-vous sûr?')) return;
      try {
        await BillingAPI.cancel();
        alert('Abonnement annulé');
        location.reload();
      } catch(e) {
        alert('Erreur: ' + e.message);
      }
    }
    loadSubscription();
  </script>
</body>
</html>
