<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abonnement — VidSpark AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0B0F19; --s1:#0c1220; --s2:#141c2e; --b1:rgba(255,255,255,.06); --b2:rgba(255,255,255,.10);
      --text:#eaecf3; --muted:#8b92a7; --purple:#FF9D1F; --purple-l:#ffb85c;
      --green:#34d399; --red:#f87171; --gold:#f5b301;
      --radius:16px; --radius-sm:12px; --shadow-sm:0 8px 24px -12px rgba(0,0,0,.6);
    }
    *{box-sizing:border-box;margin:0;padding:0;font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    body{
      background:
        radial-gradient(1100px 520px at 78% -8%, rgba(255,157,31,.08), transparent 60%),
        radial-gradient(900px 480px at 0% 0%, rgba(96,165,250,.06), transparent 55%),
        var(--bg);
      background-attachment:fixed; color:var(--text); min-height:100vh; letter-spacing:-.01em;
    }
    .fade-in{ animation: vsFadeIn .5s ease both; }
    @keyframes vsFadeIn{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }
    @media (prefers-reduced-motion: reduce){ .fade-in{ animation:none; } }
    .nav{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--b1);}
    .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;}
    .logo-badge{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,#FF9D1F,#ff7a18);display:flex;align-items:center;justify-content:center;}
    .nav a{color:var(--muted);text-decoration:none;font-size:14px;margin-left:20px;}
    .nav a:hover{color:var(--text);}
    .page{max-width:1040px;margin:0 auto;padding:48px 20px 80px;}
    .page h1{font-size:30px;font-weight:800;margin-bottom:6px;}
    .sub{color:var(--muted);margin-bottom:32px;}
    .current{background:linear-gradient(165deg, rgba(255,255,255,.055), rgba(255,255,255,.018));border:1px solid var(--b2);border-radius:var(--radius);padding:20px 24px;margin-bottom:32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:var(--shadow-sm);}
    .current .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
    .current .plan{font-size:24px;font-weight:800;}
    .pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
    .pill.free{background:rgba(139,146,167,.18);color:var(--muted);}
    .pill.pro{background:rgba(255,157,31,.2);color:var(--purple-l);}
    .pill.business{background:rgba(245,179,1,.18);color:var(--gold);}
    .pill.diamant{background:rgba(255,157,31,.18);color:#ffb85c;}
    .choose.diamant{background:linear-gradient(135deg,#FF9D1F,#ff7a18);color:#0b0f19;}
    .toggle{display:flex;justify-content:center;align-items:center;gap:12px;margin:0 0 28px;}
    .toggle button{background:var(--s2);border:1px solid var(--b2);color:var(--muted);padding:8px 18px;border-radius:20px;cursor:pointer;font-weight:600;font-size:13px;transition:all .2s cubic-bezier(.4,0,.2,1);}
    .toggle button.active{background:linear-gradient(135deg,#FF9D1F,#ff7a18);color:#0b0f19;border-color:transparent;}
    .save-badge{background:rgba(52,211,153,.15);color:var(--green);padding:4px 10px;border-radius:12px;font-size:12px;font-weight:700;}
    .plans{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;}
    .plan-card{background:linear-gradient(165deg, rgba(255,255,255,.055), rgba(255,255,255,.018));border:1px solid var(--b2);border-radius:var(--radius);padding:28px 24px;display:flex;flex-direction:column;position:relative;transition:transform .25s cubic-bezier(.4,0,.2,1),border-color .25s,box-shadow .25s;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:var(--shadow-sm);}
    .plan-card:hover{transform:translateY(-3px);border-color:rgba(255,157,31,.32);box-shadow:0 22px 50px -22px rgba(255,157,31,.35);}
    .plan-card.popular{border-color:rgba(255,157,31,.32);box-shadow:0 8px 30px rgba(255,157,31,.18);}
    .popular-tag{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#FF9D1F,#ff7a18);color:#0b0f19;font-size:11px;font-weight:700;padding:4px 14px;border-radius:12px;}
    .plan-name{font-size:18px;font-weight:800;margin-bottom:4px;}
    .plan-price{font-size:34px;font-weight:800;margin:10px 0 2px;}
    .plan-price small{font-size:14px;color:var(--muted);font-weight:500;}
    .plan-year{font-size:12px;color:var(--muted);min-height:16px;margin-bottom:16px;}
    .feats{list-style:none;flex:1;margin-bottom:20px;}
    .feats li{font-size:13px;color:var(--text);padding:7px 0;display:flex;gap:8px;align-items:flex-start;border-bottom:1px solid var(--b1);}
    .feats li.no{color:var(--muted);opacity:.6;}
    .feats .ic{color:var(--green);flex-shrink:0;}
    .feats li.no .ic{color:var(--muted);}
    .choose{width:100%;padding:13px;border:1px solid transparent;border-radius:var(--radius-sm);font-weight:700;font-size:13.5px;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);}
    .choose.primary{background:linear-gradient(135deg,#FF9D1F,#ff7a18);color:#0b0f19;box-shadow:0 8px 22px -8px rgba(255,157,31,.3);}
    .choose.gold{background:var(--gold);color:#1a1a1a;}
    .choose.ghost{background:transparent;border:1px solid var(--b2);color:var(--muted);cursor:default;}
    .choose:hover:not(.ghost){filter:brightness(1.06);transform:translateY(-1px);}
    .choose:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .cancel-row{margin-top:36px;text-align:center;}
    .cancel-row button{background:transparent;border:1px solid var(--b2);color:var(--muted);padding:10px 22px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;transition:all .2s;}
    .cancel-row button:hover{border-color:var(--red);color:var(--red);}
    #msg{text-align:center;margin-top:16px;min-height:20px;font-size:14px;}
    .secure{text-align:center;color:var(--muted);font-size:12px;margin-top:24px;}
    .app-main{ margin-left:270px; transition:margin-left .28s cubic-bezier(.4,0,.2,1); }
    body.side-collapsed .app-main{ margin-left:72px; }
    @media(max-width:1024px){ .app-main, body.side-collapsed .app-main{ margin-left:0; } }
  </style>

.tool-tile{border:none !important;}

  <div class="app-main">
  <div class="page fade-in">
    <h1 data-i18n="bill_title">Choisis ton abonnement</h1>
    <p class="sub" data-i18n="bill_sub">Débloque toute la puissance de l'IA pour optimiser tes vidéos YouTube.</p>

    <div class="current">
      <div>
        <div class="lbl" data-i18n="bill_lbl">Ton plan actuel</div>
        <div class="plan"><span id="curPlan" class="pill free">FREE</span></div>
      </div>
      <div id="curExpiry" style="color:var(--muted);font-size:13px;"></div>
    </div>

    <div class="toggle">
      <button id="btnMonth" class="active" onclick="setInterval_('month')" data-i18n="bill_monthly">Mensuel</button>
      <button id="btnYear" onclick="setInterval_('year')" data-i18n="bill_yearly">Annuel</button>

    </div>

    <div class="plans" id="plans"></div>

    <div id="msg"></div>

    <div class="cancel-row" id="cancelRow" style="display:none;">
      <button onclick="cancelSubscription()" data-i18n="bill_cancel_btn">Annuler mon abonnement</button>
    </div>

    <div class="secure" data-i18n="bill_secure">🔒 Paiement sécurisé par PayPal & Cryptomus — annulable à tout moment.</div>
  </div>

  <script>
    const API_BASE = 'https://vidspark-ai-production-9ac7.up.railway.app';
    let interval = 'month';
    let currentPlan = 'free';

    const PLANS = [
      {
        id:'free', name:'bill_plan_free', icon:'', cls:'',
        month:'$0', year:'$0', yearNote:'',
        feats:[
          ['bill_f_free_1', true],
          ['bill_f_free_2', true],
          ['bill_f_free_3', true],
          ['bill_f_free_4', false],
          ['bill_f_free_5', false],
          ['bill_f_free_6', false],
        ]
      },
      {
        id:'pro', name:'bill_plan_pro', icon:'⭐', cls:'primary', popular:true,
        month:'$9.99', year:'$7.99', yearNote:'bill_year_pro',
        feats:[
          ['bill_f_pro_1', true],
          ['bill_f_pro_2', true],
          ['bill_f_pro_3', true],
          ['bill_f_pro_4', true],
          ['bill_f_pro_5', true],
          ['bill_f_pro_6', true],
        ]
      },
      {
        id:'business', name:'bill_plan_biz', icon:'💼', cls:'gold',
        month:'$29.99', year:'$23.99', yearNote:'bill_year_biz',
        feats:[
          ['bill_f_biz_1', true],
          ['bill_f_biz_2', true],
          ['bill_f_biz_3', true],
          ['bill_f_biz_4', true],
          ['bill_f_biz_5', true],
          ['bill_f_biz_6', true],
        ]
      },
      {
        id:'diamant', name:'bill_plan_dmt', icon:'💎', cls:'diamant',
        month:'$49.99', year:'$44.99', yearNote:'bill_year_dmt',
        feats:[
          ['bill_f_dmt_1', true],
          ['bill_f_dmt_2', true],
          ['bill_f_dmt_3', true],
          ['bill_f_dmt_4', true],
          ['bill_f_dmt_5', true],
          ['bill_f_dmt_6', true],
        ]
      }
    ];

    function setInterval_(i){
      interval = i;
      document.getElementById('btnMonth').classList.toggle('active', i==='month');
      document.getElementById('btnYear').classList.toggle('active', i==='year');
      renderPlans();
    }

    function renderPlans(){
      const wrap = document.getElementById('plans');
      wrap.innerHTML = PLANS.map(p=>{
        const price = interval==='month' ? p.month : p.year;
        const note  = p.id==='free' ? '' : (interval==='year' ? t(p.yearNote) : t('bill_per_month'));
        const isCurrent = p.id===currentPlan;
        let btn;
        if (p.id==='free'){
          btn = `<button class="choose ghost" disabled>${isCurrent?t('bill_current_plan'):t('bill_free_btn')}</button>`;
        } else if (isCurrent){
          btn = `<button class="choose ghost" disabled>✓ ${t('bill_your_plan')}</button>`;
        } else {
          btn = `<button class="choose ${p.cls}" onclick="checkout('${p.id}')">${p.icon} ${t('bill_choose')} ${t(p.name)}</button>`;
        }
        const feats = p.feats.map(f=>`<li class="${f[1]?'':'no'}"><span class="ic">${f[1]?'✓':'✕'}</span> ${t(f[0])}</li>`).join('');
        return `
          <div class="plan-card ${p.popular?'popular':''}">
            ${p.popular?`<div class="popular-tag">★ ${t('bill_popular')}</div>`:''}
            <div class="plan-name">${p.icon} ${t(p.name)}</div>
            <div class="plan-price">${price} <small>${p.id!=='free'?t('bill_per_month_s'):''}</small></div>
            <div class="plan-year">${note}</div>
            <ul class="feats">${feats}</ul>
            ${btn}
          </div>`;
      }).join('');
    }

    async function checkout(plan, provider = null){
      const msg = document.getElementById('msg');

      // Si pas de provider spécifié, demander à l'utilisateur
      if(!provider){
        msg.style.color = 'var(--muted)';
        msg.innerHTML = `
          <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px;">
            <button onclick="checkout('${plan}','paypal')" style="padding:12px 24px;background:var(--purple);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;">🅿️ PayPal</button>
            <button onclick="checkout('${plan}','cryptomus')" style="padding:12px 24px;background:var(--gold);color:#1a1a1a;border:none;border-radius:8px;cursor:pointer;font-weight:600;">₿ USD / USDT</button>
          </div>
        `;
        return;
      }

      // Cryptomus: Appel API pour créer le paiement
      if(provider === 'cryptomus'){
        msg.style.color = 'var(--muted)';
        msg.textContent = t('bill_loading_crypt');
        try{
          const session = await Auth.getSession();
          if(!session?.access_token){ msg.textContent=t('bill_err_login'); setTimeout(()=>location.href='login',1200); return; }
          const res = await fetch(`${API_BASE}/api/subscription/checkout/cryptomus`,{
            method:'POST',
            headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},
            body: JSON.stringify({ plan, interval })
          });
          const data = await res.json();
          if(res.ok && data.checkout_url){
            window.location.href = data.checkout_url;
          } else {
            msg.style.color='var(--red)';
            msg.textContent = '❌ ' + (data.error || t('bill_err_crypt'));
          }
        }catch(e){
          msg.style.color='var(--red)';
          msg.textContent = '❌ Erreur : ' + e.message;
        }
        return;
      }

      // PayPal: Appel API
      msg.style.color = 'var(--muted)';
      msg.textContent = t('bill_loading_pp');
      try{
        const session = await Auth.getSession();
        if(!session?.access_token){ msg.textContent=t('bill_err_login'); setTimeout(()=>location.href='login',1200); return; }
        const res = await fetch(`${API_BASE}/api/subscription/checkout/paypal`,{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},
          body: JSON.stringify({ plan, interval })
        });
        const data = await res.json();
        if(res.ok && data.checkout_url){
          window.location.href = data.checkout_url;
        } else {
          msg.style.color='var(--red)';
          msg.textContent = '❌ ' + (data.error || t('bill_err_pp'));
        }
      }catch(e){
        msg.style.color='var(--red)';
        msg.textContent = '❌ Erreur : ' + e.message;
      }
    }

    async function cancelSubscription(){
      if(!confirm(t('bill_confirm_cancel'))) return;
      const msg = document.getElementById('msg');
      try{
        const session = await Auth.getSession();
        const res = await fetch(`${API_BASE}/api/subscription/cancel`,{
          method:'POST',
          headers:{'Authorization':`Bearer ${session.access_token}`}
        });
        if(res.ok){ msg.style.color='var(--green)'; msg.textContent=t('bill_ok_cancel'); setTimeout(()=>location.reload(),1500); }
        else { const d=await res.json().catch(()=>({})); msg.style.color='var(--red)'; msg.textContent='❌ '+(d.error||'Erreur'); }
      }catch(e){ msg.style.color='var(--red)'; msg.textContent='❌ '+e.message; }
    }

    async function loadCurrent(){
      try{
        const session = await Auth.getSession();
        if(!session?.access_token){ location.href='login'; return; }
        const res = await fetch(`${API_BASE}/api/user/me`,{ headers:{'Authorization':`Bearer ${session.access_token}`} });
        if(res.ok){
          const u = await res.json();
          currentPlan = (u.plan||'free').toLowerCase();
          const el = document.getElementById('curPlan');
          el.textContent = currentPlan.toUpperCase();
          el.className = 'pill ' + currentPlan;
          if(currentPlan!=='free'){
            document.getElementById('cancelRow').style.display='block';
            if(u.subscription_expiry){
              const d=new Date(u.subscription_expiry);
              document.getElementById('curExpiry').textContent = t('bill_valid_until') + ' ' + d.toLocaleDateString();
            }
          }
        }
      }catch(e){ /* garde free par défaut */ }
      renderPlans();
    }

    loadCurrent();
    if (window.VidSparkShell) VidSparkShell.mount({ active: 'billing', title: t ? t('sb_sub') : 'Abonnement', subtitle: '' });
  </script>
  </div><!-- /.app-main -->
</body>
</html>
