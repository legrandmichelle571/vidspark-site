<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abonnement — VidSpark AI</title>
  <style>
    :root{
      --bg:#07070a; --s1:#0e0e12; --s2:#141418; --b1:#1e1e26; --b2:#2a2a35;
      --text:#e8e8f0; --muted:#8888a0; --purple:#7c6dfa; --purple-l:#a78bfa;
      --green:#22c55e; --red:#ef4444; --gold:#f5b301;
    }
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
    body{background:var(--bg);color:var(--text);min-height:100vh;}
    .nav{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--b1);}
    .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;}
    .logo-badge{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#7c6dfa,#a78bfa);display:flex;align-items:center;justify-content:center;}
    .nav a{color:var(--muted);text-decoration:none;font-size:14px;margin-left:20px;}
    .nav a:hover{color:var(--text);}
    .page{max-width:1040px;margin:0 auto;padding:48px 20px 80px;}
    .page h1{font-size:30px;font-weight:800;margin-bottom:6px;}
    .sub{color:var(--muted);margin-bottom:32px;}
    .current{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:20px 24px;margin-bottom:32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
    .current .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
    .current .plan{font-size:24px;font-weight:800;}
    .pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
    .pill.free{background:rgba(136,136,160,.18);color:var(--muted);}
    .pill.pro{background:rgba(124,109,250,.2);color:var(--purple-l);}
    .pill.business{background:rgba(245,179,1,.18);color:var(--gold);}
    .toggle{display:flex;justify-content:center;align-items:center;gap:12px;margin:0 0 28px;}
    .toggle button{background:var(--s2);border:1px solid var(--b2);color:var(--muted);padding:8px 18px;border-radius:20px;cursor:pointer;font-weight:600;font-size:13px;}
    .toggle button.active{background:var(--purple);color:#fff;border-color:var(--purple);}
    .save-badge{background:rgba(34,197,94,.15);color:var(--green);padding:4px 10px;border-radius:12px;font-size:12px;font-weight:700;}
    .plans{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:20px;}
    .plan-card{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:28px 24px;display:flex;flex-direction:column;position:relative;transition:transform .15s,border-color .15s;}
    .plan-card:hover{transform:translateY(-4px);border-color:var(--b2);}
    .plan-card.popular{border-color:var(--purple);box-shadow:0 8px 30px rgba(124,109,250,.18);}
    .popular-tag{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--purple);color:#fff;font-size:11px;font-weight:700;padding:4px 14px;border-radius:12px;}
    .plan-name{font-size:18px;font-weight:800;margin-bottom:4px;}
    .plan-price{font-size:34px;font-weight:800;margin:10px 0 2px;}
    .plan-price small{font-size:14px;color:var(--muted);font-weight:500;}
    .plan-year{font-size:12px;color:var(--muted);min-height:16px;margin-bottom:16px;}
    .feats{list-style:none;flex:1;margin-bottom:20px;}
    .feats li{font-size:13px;color:var(--text);padding:7px 0;display:flex;gap:8px;align-items:flex-start;border-bottom:1px solid var(--b1);}
    .feats li.no{color:var(--muted);opacity:.6;}
    .feats .ic{color:var(--green);flex-shrink:0;}
    .feats li.no .ic{color:var(--muted);}
    .choose{width:100%;padding:13px;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;transition:opacity .15s;}
    .choose.primary{background:var(--purple);color:#fff;}
    .choose.gold{background:var(--gold);color:#1a1a1a;}
    .choose.ghost{background:transparent;border:1px solid var(--b2);color:var(--muted);cursor:default;}
    .choose:hover:not(.ghost){opacity:.88;}
    .choose:disabled{opacity:.5;cursor:not-allowed;}
    .cancel-row{margin-top:36px;text-align:center;}
    .cancel-row button{background:transparent;border:1px solid var(--b2);color:var(--muted);padding:10px 22px;border-radius:8px;cursor:pointer;font-size:13px;}
    .cancel-row button:hover{border-color:var(--red);color:var(--red);}
    #msg{text-align:center;margin-top:16px;min-height:20px;font-size:14px;}
    .secure{text-align:center;color:var(--muted);font-size:12px;margin-top:24px;}
  </style>
</head>
<body>
  <div class="nav">
    <div class="logo"><span class="logo-badge">✦</span> VidSpark AI</div>
    <div><a href="dashboard">← Tableau de bord</a></div>
  </div>

  <div class="page">
    <h1>Choisis ton abonnement</h1>
    <p class="sub">Débloque toute la puissance de l'IA pour optimiser tes vidéos YouTube.</p>

    <div class="current">
      <div>
        <div class="lbl">Ton plan actuel</div>
        <div class="plan"><span id="curPlan" class="pill free">FREE</span></div>
      </div>
      <div id="curExpiry" style="color:var(--muted);font-size:13px;"></div>
    </div>

    <div class="toggle">
      <button id="btnMonth" class="active" onclick="setInterval_('month')">Mensuel</button>
      <button id="btnYear" onclick="setInterval_('year')">Annuel</button>
      <span class="save-badge">2 mois offerts /an</span>
    </div>

    <div class="plans" id="plans"></div>

    <div id="msg"></div>

    <div class="cancel-row" id="cancelRow" style="display:none;">
      <button onclick="cancelSubscription()">Annuler mon abonnement</button>
    </div>

    <div class="secure">🔒 Paiement sécurisé par PayPal & Cryptomus — annulable à tout moment.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const API_BASE = 'https://vidspark-ai-production-9ac7.up.railway.app';
    let interval = 'month';
    let currentPlan = 'free';

    const PLANS = [
      {
        id:'free', name:'Gratuit', icon:'', cls:'',
        month:'0€', year:'0€', yearNote:'',
        feats:[
          ['Score SEO, Viral & Miniature', true],
          ['Checklist SEO', true],
          ['Suggestions de base', true],
          ['Titres IA optimisés', false],
          ['Rapport IA complet', false],
          ['Analyse concurrents', false],
        ]
      },
      {
        id:'pro', name:'Pro', icon:'⭐', cls:'primary', popular:true,
        month:'9,99€', year:'7,99€', yearNote:'soit 95,90€/an',
        feats:[
          ['Tout le plan Gratuit', true],
          ['🎯 Titres IA optimisés', true],
          ['📊 Rapport IA complet', true],
          ['🔍 Analyse concurrents', true],
          ['200 analyses / jour', true],
          ['100 titres IA / jour', true],
        ]
      },
      {
        id:'business', name:'Business', icon:'💼', cls:'gold',
        month:'29,99€', year:'23,99€', yearNote:'soit 287,90€/an',
        feats:[
          ['Tout le plan Pro', true],
          ['📺 Multi-chaînes (5)', true],
          ['👥 Accès équipe', true],
          ['🔌 Accès API', true],
          ['1000 analyses / jour', true],
          ['500 titres IA / jour', true],
        ]
      }
    ];

    function setInterval_(i){
      interval = i;
      document.getElementById('btnMonth').classList.toggle('active', i==='month');
      document.getElementById('btnYear').classList.toggle('active', i==='year');
      renderPlans();
    }

    function renderPlans(){
      const wrap = document.getElementById('plans');
      wrap.innerHTML = PLANS.map(p=>{
        const price = interval==='month' ? p.month : p.year;
        const note  = p.id==='free' ? '' : (interval==='year' ? p.yearNote : 'par mois');
        const isCurrent = p.id===currentPlan;
        let btn;
        if (p.id==='free'){
          btn = `<button class="choose ghost" disabled>${isCurrent?'Plan actuel':'Gratuit'}</button>`;
        } else if (isCurrent){
          btn = `<button class="choose ghost" disabled>✓ Ton plan actuel</button>`;
        } else {
          btn = `<button class="choose ${p.cls}" onclick="checkout('${p.id}')">${p.icon} Choisir ${p.name}</button>`;
        }
        const feats = p.feats.map(f=>`<li class="${f[1]?'':'no'}"><span class="ic">${f[1]?'✓':'✕'}</span> ${f[0]}</li>`).join('');
        return `
          <div class="plan-card ${p.popular?'popular':''}">
            ${p.popular?'<div class="popular-tag">★ Le plus populaire</div>':''}
            <div class="plan-name">${p.icon} ${p.name}</div>
            <div class="plan-price">${price} <small>${p.id!=='free'?'/mois':''}</small></div>
            <div class="plan-year">${note}</div>
            <ul class="feats">${feats}</ul>
            ${btn}
          </div>`;
      }).join('');
    }

    async function checkout(plan, provider = null){
      const msg = document.getElementById('msg');

      // Si pas de provider spécifié, demander à l'utilisateur
      if(!provider){
        msg.style.color = 'var(--muted)';
        msg.innerHTML = `
          <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px;">
            <button onclick="checkout('${plan}','paypal')" style="padding:12px 24px;background:var(--purple);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;">🅿️ PayPal</button>
            <button onclick="checkout('${plan}','cryptomus')" style="padding:12px 24px;background:var(--gold);color:#1a1a1a;border:none;border-radius:8px;cursor:pointer;font-weight:600;">₿ USDT / Card</button>
          </div>
        `;
        return;
      }

      msg.style.color = 'var(--muted)';
      msg.textContent = '⏳ Redirection vers le paiement sécurisé...';
      try{
        const session = await Auth.getSession();
        if(!session?.access_token){ msg.textContent='⚠️ Connecte-toi d\'abord.'; setTimeout(()=>location.href='login',1200); return; }
        const res = await fetch(`${API_BASE}/api/subscription/checkout/${provider}`,{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},
          body: JSON.stringify({ plan, interval })
        });
        const data = await res.json();
        if(res.ok && data.checkout_url){
          window.location.href = data.checkout_url;
        } else {
          msg.style.color='var(--red)';
          msg.textContent = '❌ ' + (data.error || 'Erreur lors de la création du paiement');
        }
      }catch(e){
        msg.style.color='var(--red)';
        msg.textContent = '❌ Erreur réseau : ' + e.message;
      }
    }

    async function cancelSubscription(){
      if(!confirm('Annuler ton abonnement ? Tu repasseras en Gratuit à la fin de la période.')) return;
      const msg = document.getElementById('msg');
      try{
        const session = await Auth.getSession();
        const res = await fetch(`${API_BASE}/api/subscription/cancel`,{
          method:'POST',
          headers:{'Authorization':`Bearer ${session.access_token}`}
        });
        if(res.ok){ msg.style.color='var(--green)'; msg.textContent='✅ Abonnement annulé.'; setTimeout(()=>location.reload(),1500); }
        else { const d=await res.json().catch(()=>({})); msg.style.color='var(--red)'; msg.textContent='❌ '+(d.error||'Erreur'); }
      }catch(e){ msg.style.color='var(--red)'; msg.textContent='❌ '+e.message; }
    }

    async function loadCurrent(){
      try{
        const session = await Auth.getSession();
        if(!session?.access_token){ location.href='login'; return; }
        const res = await fetch(`${API_BASE}/api/user/me`,{ headers:{'Authorization':`Bearer ${session.access_token}`} });
        if(res.ok){
          const u = await res.json();
          currentPlan = (u.plan||'free').toLowerCase();
          const el = document.getElementById('curPlan');
          el.textContent = currentPlan.toUpperCase();
          el.className = 'pill ' + currentPlan;
          if(currentPlan!=='free'){
            document.getElementById('cancelRow').style.display='block';
            if(u.subscription_expiry){
              const d=new Date(u.subscription_expiry);
              document.getElementById('curExpiry').textContent = 'Valide jusqu\'au ' + d.toLocaleDateString('fr-FR');
            }
          }
        }
      }catch(e){ /* garde free par défaut */ }
      renderPlans();
    }

    loadCurrent();
  </script>
</body>
</html>
